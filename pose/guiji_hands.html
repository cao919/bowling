<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>手部 / 球体 追踪与轨迹绘制</title>

     <!-- MediaPipe Hands -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

    <script src="libs/mediapipe/drawing_utils.js"></script>
    <script src="libs/mediapipe/hands.js"></script>
    <!-- TensorFlow.js + COCO-SSD (本地离线版) -->
    <script src="libs/tensorflow/tf.min.js"></script>
    <script src="libs/tensorflow/coco-ssd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #111;
            color: #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        h1 {
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        .sub {
            color: #888;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 24px;
            max-width: 1200px;
            width: 100%;
        }
        .card {
            background: #1e1e1e;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.8);
            border: 1px solid #333;
            flex: 1 1 400px;
            min-width: 300px;
        }
        .card h3 {
            margin-top: 0;
            margin-bottom: 12px;
            text-align: center;
            color: #aaa;
            font-weight: 300;
            letter-spacing: 1px;
        }
        video {
            transform: rotateY(180deg);
            -webkit-transform: rotateY(180deg);
            display: block;
            border-radius: 8px;
            background: #000;
            width: 100%;
            height: auto;
            max-width: 100%;
        }
        canvas {
            display: block;
            border-radius: 8px;
            background: #0a0a0a;
            width: 100%;
            height: auto;
            max-width: 100%;
            cursor: crosshair;
        }
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 16px 0 10px;
            flex-wrap: wrap;
        }
        .controls label {
            font-size: 16px;
            color: #ccc;
        }
        .controls select {
            padding: 8px 20px;
            border-radius: 40px;
            background: #2a2a2a;
            color: #fff;
            border: 1px solid #444;
            font-size: 16px;
            cursor: pointer;
            outline: none;
        }
        .controls select:focus {
            border-color: #facc15;
        }
        .status {
            padding: 8px 20px;
            background: #2a2a2a;
            border-radius: 40px;
            font-size: 14px;
            border-left: 4px solid #4caf50;
            color: #4caf50;
            transition: all 0.3s;
            text-align: center;
            min-width: 200px;
        }
        .footer {
            margin-top: 24px;
            font-size: 13px;
            color: #555;
        }
        .footer kbd {
            background: #2a2a2a;
            padding: 2px 10px;
            border-radius: 6px;
            color: #ddd;
            border: 1px solid #444;
        }
        @media (max-width: 700px) {
            .container { flex-direction: column; align-items: center; }
            .card { flex: 1 1 auto; width: 100%; }
        }
    </style>
</head>
<body>
    <h1>🎳 实时追踪 · 轨迹绘制</h1>
    <p class="sub">选择追踪目标：手部 或 运动球（sports ball）</p>

    <div class="container">
        <!-- 左：摄像头画面 -->
        <div class="card">
            <h3>📹 摄像头</h3>
            <video id="webcam" playsinline></video>
        </div>

        <!-- 右：轨迹画布 -->
        <div class="card">
            <h3>📈 运动轨迹</h3>
            <canvas id="trailCanvas" width="480" height="360"></canvas>
        </div>
    </div>

    <!-- 控制区 -->
    <div class="controls">
        <label for="modeSelect">追踪模式：</label>
        <select id="modeSelect">
            <option value="hand">🖐️ 手部</option>
            <option value="ball">⚽ 球体</option>
        </select>
        <div class="status" id="statusIndicator">⏳ 正在加载...</div>
    </div>
    <div class="footer">按 <kbd>R</kbd> 键重置轨迹</div>

    <script>
        // --- DOM 元素 ---
        const video = document.getElementById('webcam');
        const trailCanvas = document.getElementById('trailCanvas');
        const ctx = trailCanvas.getContext('2d');
        const statusDiv = document.getElementById('statusIndicator');
        const modeSelect = document.getElementById('modeSelect');

        // --- 轨迹数据 ---
        let trailPoints = [];
        const MAX_POINTS = 80;

        // --- 追踪状态 ---
        let currentMode = 'hand'; // 'hand' 或 'ball'
        let handDetector = null;
        let cocoDetector = null;
        let isModelLoading = false;
        let camera = null;

        // --- 工具函数：添加轨迹点 ---
        function addTrailPoint(x, y) {
            // 归一化坐标 (0-1)
            const point = { x: Math.min(1, Math.max(0, x)), y: Math.min(1, Math.max(0, y)) };
            trailPoints.push(point);
            if (trailPoints.length > MAX_POINTS) {
                trailPoints.shift();
            }
            drawTrail();
        }

        function resetTrail() {
            trailPoints = [];
            drawTrail();
            statusDiv.textContent = '🔄 轨迹已重置';
            setTimeout(() => updateStatusText(), 800);
        }

        // --- 绘制轨迹 ---
        function drawTrail() {
            const w = trailCanvas.width, h = trailCanvas.height;
            ctx.clearRect(0, 0, w, h);

            if (trailPoints.length < 2) {
                ctx.fillStyle = '#444';
                ctx.font = '16px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('等待追踪数据...', w/2, h/2);
                return;
            }

            // 连线
            for (let i = 1; i < trailPoints.length; i++) {
                const p1 = trailPoints[i-1], p2 = trailPoints[i];
                const alpha = 0.2 + 0.8 * (i / trailPoints.length);
                ctx.beginPath();
                ctx.moveTo(p1.x * w, p1.y * h);
                ctx.lineTo(p2.x * w, p2.y * h);
                ctx.strokeStyle = `rgba(255, 200, 50, ${alpha})`;
                ctx.lineWidth = 3;
                ctx.stroke();
            }

            // 点
            for (let i = 0; i < trailPoints.length; i++) {
                const p = trailPoints[i];
                const radius = 3 + 7 * (i / trailPoints.length);
                const alpha = 0.3 + 0.7 * (i / trailPoints.length);
                const gradient = ctx.createRadialGradient(
                    p.x * w - radius/2, p.y * h - radius/2, 0,
                    p.x * w, p.y * h, radius
                );
                gradient.addColorStop(0, `rgba(255, 220, 100, ${alpha})`);
                gradient.addColorStop(1, `rgba(255, 150, 50, ${alpha * 0.8})`);
                ctx.beginPath();
                ctx.arc(p.x * w, p.y * h, radius, 0, 2 * Math.PI);
                ctx.fillStyle = gradient;
                ctx.shadowColor = `rgba(255, 200, 50, ${alpha * 0.4})`;
                ctx.shadowBlur = 12;
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            ctx.fillStyle = '#666';
            ctx.font = '12px monospace';
            ctx.textAlign = 'right';
            ctx.fillText(`点数: ${trailPoints.length}`, w - 10, 20);
        }

        // --- 更新状态文字 ---
        function updateStatusText() {
            if (currentMode === 'hand') {
                statusDiv.textContent = '✅ 手部追踪中 (食指指尖)';
                statusDiv.style.borderLeftColor = '#4caf50';
                statusDiv.style.color = '#4caf50';
            } else {
                statusDiv.textContent = '✅ 球体追踪中 (sports ball)';
                statusDiv.style.borderLeftColor = '#4caf50';
                statusDiv.style.color = '#4caf50';
            }
        }

        // --- 启动摄像头 ---
        function startCamera() {
            if (camera) {
                camera.stop(); // 先停止之前的
            }
            camera = new Camera(video, {
                onFrame: async () => {
                    // 根据当前模式调用不同的检测
                    if (currentMode === 'hand' && handDetector) {
                        await handDetector.send({ image: video });
                    } else if (currentMode === 'ball' && cocoDetector) {
                        await detectBall(video);
                    }
                },
                width: 640,
                height: 480
            });
            camera.start().catch(err => {
                console.error('摄像头启动失败:', err);
                statusDiv.textContent = '❌ 摄像头错误: ' + err.message;
                statusDiv.style.borderLeftColor = '#f44336';
                statusDiv.style.color = '#f44336';
            });
        }

        // --- 手部检测结果回调 ---
        function onHandResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                // 使用食指指尖 (landmark 8)
                const tip = landmarks[8];
                if (tip) {
                    addTrailPoint(tip.x, tip.y);
                    if (statusDiv.textContent.includes('等待') || statusDiv.textContent.includes('加载')) {
                        updateStatusText();
                    }
                }
            } else {
                // 无手，但为了状态显示，不频繁更新
            }
        }

        // --- 球体检测 (COCO-SSD) ---
        let ballMissCount = 0;

        async function detectBall(image) {
            if (!cocoDetector) return;
            try {
                const predictions = await cocoDetector.detect(image);
                // 查找类别为 'sports ball' 的对象
                let bestBall = null;
                let bestScore = 0.3; // 最低置信度阈值
                for (const pred of predictions) {
                    if (pred.class === 'sports ball' && pred.score > bestScore) {
                        bestScore = pred.score;
                        bestBall = pred;
                    }
                }
                if (bestBall) {
                    ballMissCount = 0;
                    // 计算边界框中心 (bbox格式: [x, y, width, height])
                    const [x, y, w, h] = bestBall.bbox;
                    const cx = (x + w / 2) / image.videoWidth;   // 归一化
                    const cy = (y + h / 2) / image.videoHeight;
                    addTrailPoint(cx, cy);
                    statusDiv.textContent = '⚽ 球体追踪中 (置信度: ' + (bestBall.score * 100).toFixed(0) + '%)';
                    statusDiv.style.borderLeftColor = '#4caf50';
                    statusDiv.style.color = '#4caf50';
                    console.log('Ball detected:', {cx, cy, score: bestBall.score});
                } else {
                    ballMissCount++;
                    if (ballMissCount > 30) {
                        statusDiv.textContent = '⚠️ 未检测到球体，请将球对准摄像头';
                        statusDiv.style.borderLeftColor = '#ff9800';
                        statusDiv.style.color = '#ff9800';
                    }
                }
            } catch (err) {
                console.warn('检测出错:', err);
            }
        }

        // --- 初始化模型 ---
        async function initHands() {
            if (handDetector) {
                // 如果已存在，直接返回
                return;
            }
            statusDiv.textContent = '⏳ 加载手部模型...';
            statusDiv.style.borderLeftColor = '#ff9800';
            statusDiv.style.color = '#ff9800';
            handDetector = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });
            handDetector.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.6
            });
            handDetector.onResults(onHandResults);
            // 模型会随摄像头循环自动加载
            statusDiv.textContent = '✅ 手部模型就绪';
            statusDiv.style.borderLeftColor = '#4caf50';
            statusDiv.style.color = '#4caf50';
        }

        async function initCoco() {
            if (cocoDetector) return;
            statusDiv.textContent = '⏳ 加载球体检测模型 (COCO-SSD)...';
            statusDiv.style.borderLeftColor = '#ff9800';
            statusDiv.style.color = '#ff9800';
            try {
                cocoDetector = await cocoSsd.load();
                statusDiv.textContent = '✅ 球体模型就绪';
                statusDiv.style.borderLeftColor = '#4caf50';
                statusDiv.style.color = '#4caf50';
            } catch (err) {
                console.error('COCO-SSD加载失败:', err);
                statusDiv.textContent = '❌ 模型加载失败: ' + err.message;
                statusDiv.style.borderLeftColor = '#f44336';
                statusDiv.style.color = '#f44336';
            }
        }

        // --- 切换模式 ---
        async function switchMode(mode) {
            if (mode === currentMode && handDetector && cocoDetector) {
                // 如果已经加载了所需模型，直接更新状态
                updateStatusText();
                return;
            }
            currentMode = mode;
            // 重置轨迹
            resetTrail();

            if (mode === 'hand') {
                // 初始化手部模型（如果未加载）
                await initHands();
                // 如果之前有球模型，可以卸载以节省内存（可选）
                // 但为了快速切换，不卸载
            } else { // ball
                await initCoco();
            }
            updateStatusText();
        }

        // --- 监听模式切换 ---
        modeSelect.addEventListener('change', (e) => {
            const newMode = e.target.value;
            switchMode(newMode);
        });

        // --- 键盘重置 ---
        document.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R') {
                resetTrail();
            }
        });

        // --- 页面启动 ---
        window.onload = async () => {
            drawTrail();
            // 默认手部模式
            await switchMode('hand');
            startCamera();
        };

        // 窗口resize时重绘
        window.addEventListener('resize', drawTrail);
    </script>
</body>
</html>
