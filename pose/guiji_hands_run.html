<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>跑步 手部摆动轨迹追踪</title>

    <script src="libs/mediapipe/camera_utils.js"></script>
    <script src="libs/mediapipe/drawing_utils.js"></script>
    <script src="libs/mediapipe/hands.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        h1 {
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 6px;
            color: #58a6ff;
        }
        .sub {
            color: #8b949e;
            margin-bottom: 18px;
            font-size: 14px;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            max-width: 1400px;
            width: 100%;
        }
        .card {
            background: #161b22;
            border-radius: 12px;
            padding: 14px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.6);
            border: 1px solid #30363d;
            flex: 1 1 380px;
            min-width: 320px;
        }
        .card h3 {
            margin-top: 0;
            margin-bottom: 10px;
            text-align: center;
            color: #8b949e;
            font-weight: 300;
            letter-spacing: 1px;
            font-size: 15px;
        }
        video {
            transform: rotateY(180deg);
            -webkit-transform: rotateY(180deg);
            display: block;
            border-radius: 8px;
            background: #000;
            width: 100%;
            height: auto;
            max-width: 100%;
        }
        canvas {
            display: block;
            border-radius: 8px;
            background: #0a0a0f;
            width: 100%;
            height: auto;
            max-width: 100%;
        }

        /* 左右手轨迹并排 */
        .trail-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .trail-half {
            flex: 1 1 180px;
            min-width: 160px;
        }
        .trail-half h4 {
            text-align: center;
            font-weight: 300;
            font-size: 13px;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }
        .trail-half canvas {
            width: 100%;
            border-radius: 6px;
            background: #0a0a0f;
        }

        /* 分析面板 */
        .analysis-panel {
            background: #161b22;
            border-radius: 12px;
            padding: 14px 18px;
            border: 1px solid #30363d;
            margin-top: 16px;
            max-width: 1400px;
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
            justify-content: center;
        }
        .metric {
            text-align: center;
            min-width: 80px;
        }
        .metric .label {
            font-size: 11px;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .metric .value {
            font-size: 22px;
            font-weight: 600;
            color: #58a6ff;
            font-variant-numeric: tabular-nums;
        }
        .metric .value.green { color: #3fb950; }
        .metric .value.orange { color: #d2991d; }
        .metric .value.pink { color: #db61a2; }

        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin: 14px 0 8px;
            flex-wrap: wrap;
        }
        .controls label {
            font-size: 14px;
            color: #8b949e;
        }
        .controls select, .controls button {
            padding: 6px 16px;
            border-radius: 6px;
            background: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
            font-size: 14px;
            cursor: pointer;
            outline: none;
        }
        .controls select:focus, .controls button:hover {
            border-color: #58a6ff;
        }
        .controls button {
            background: #238636;
            border-color: #2ea043;
            color: #fff;
        }
        .controls button:hover {
            background: #2ea043;
        }

        .status {
            padding: 6px 16px;
            background: #21262d;
            border-radius: 20px;
            font-size: 13px;
            border-left: 4px solid #3fb950;
            color: #3fb950;
            text-align: center;
            min-width: 180px;
        }
        .footer {
            margin-top: 18px;
            font-size: 12px;
            color: #484f58;
        }
        .footer kbd {
            background: #21262d;
            padding: 2px 8px;
            border-radius: 4px;
            color: #c9d1d9;
            border: 1px solid #30363d;
        }

        @media (max-width: 800px) {
            .container { flex-direction: column; align-items: center; }
            .card { flex: 1 1 auto; width: 100%; }
        }
    </style>
</head>
<body>
    <h1>跑步 · 手部摆动轨迹追踪</h1>
    <p class="sub">追踪跑步时左右手的摆动轨迹，分析摆臂幅度与节奏</p>

    <div class="container">
        <!-- 左：摄像头 -->
        <div class="card">
            <h3>摄像头</h3>
            <video id="webcam" playsinline></video>
        </div>

        <!-- 中：左右手独立轨迹 -->
        <div class="card">
            <h3>左右手摆动轨迹</h3>
            <div class="trail-row">
                <div class="trail-half">
                    <h4 style="color:#58a6ff;">左手轨迹</h4>
                    <canvas id="leftTrailCanvas" width="300" height="360"></canvas>
                </div>
                <div class="trail-half">
                    <h4 style="color:#f0883e;">右手轨迹</h4>
                    <canvas id="rightTrailCanvas" width="300" height="360"></canvas>
                </div>
            </div>
        </div>

        <!-- 右：合体俯视轨迹 -->
        <div class="card">
            <h3>俯视轨迹 (双手叠加)</h3>
            <canvas id="overlayCanvas" width="480" height="360"></canvas>
        </div>
    </div>

    <!-- 实时分析 -->
    <div class="analysis-panel" id="analysisPanel">
        <div class="metric">
            <div class="label">摆动频率</div>
            <div class="value green" id="freqVal">0</div>
            <div class="label">次/秒</div>
        </div>
        <div class="metric">
            <div class="label">左手幅度</div>
            <div class="value orange" id="leftAmpVal">0</div>
            <div class="label">像素</div>
        </div>
        <div class="metric">
            <div class="label">右手幅度</div>
            <div class="value pink" id="rightAmpVal">0</div>
            <div class="label">像素</div>
        </div>
        <div class="metric">
            <div class="label">摆动相位差</div>
            <div class="value" id="phaseVal">0°</div>
            <div class="label">理想 ~180°</div>
        </div>
        <div class="metric">
            <div class="label">轨迹点数</div>
            <div class="value" id="pointCount">0</div>
        </div>
    </div>

    <!-- 控制区 -->
    <div class="controls">
        <label for="viewSelect">视角：</label>
        <select id="viewSelect">
            <option value="xy">正常视角 (X-Y)</option>
            <option value="xz">俯视 (X-深度)</option>
            <option value="yz">侧面 (深度-Y)</option>
        </select>
        <button id="resetBtn">重置轨迹 (R)</button>
        <div class="status" id="statusIndicator">⏳ 正在加载...</div>
    </div>
    <div class="footer">按 <kbd>R</kbd> 重置 | 按 <kbd>F</kbd> 全屏 | 侧身面对摄像头摆臂效果最佳</div>

    <script>
        const video = document.getElementById('webcam');
        const leftCvs = document.getElementById('leftTrailCanvas');
        const leftCtx = leftCvs.getContext('2d');
        const rightCvs = document.getElementById('rightTrailCanvas');
        const rightCtx = rightCvs.getContext('2d');
        const overlayCvs = document.getElementById('overlayCanvas');
        const overlayCtx = overlayCvs.getContext('2d');
        const statusDiv = document.getElementById('statusIndicator');
        const viewSelect = document.getElementById('viewSelect');

        // --- 轨迹数据 ---
        const MAX_POINTS = 120;
        let leftTrail = [];   // {x, y, z}
        let rightTrail = [];
        let leftColor = '#58a6ff';
        let rightColor = '#f0883e';

        // --- 方向检测：判断左右手 ---
        // MediaPipe 的 x 坐标：0=左边(画面左侧), 1=右边(画面右侧)
        // 注意：视频做了 rotateY(180deg) 镜像，但 landmarks 坐标是原始画面的
        // 如果用户侧身面对摄像头：画面左 = 实际右

        let handDetector = null;
        let camera = null;

        // --- 摆动分析 ---
        let leftYHistory = [];     // 左手 y 值历史 (用于频率/幅度)
        let rightYHistory = [];
        let swingPeaks = [];       // 记录峰值时间戳
        const ANALYSIS_WINDOW = 60; // 分析窗口帧数

        function addTrailPoint(hand, x, y, z) {
            const point = {
                x: Math.min(1, Math.max(0, x)),
                y: Math.min(1, Math.max(0, y)),
                z: Math.min(1, Math.max(0, z || 0)),
                t: performance.now()
            };
            const trail = hand === 'left' ? leftTrail : rightTrail;
            trail.push(point);
            if (trail.length > MAX_POINTS) trail.shift();

            // 记录 Y 值用于分析
            if (hand === 'left') {
                leftYHistory.push(y);
                if (leftYHistory.length > ANALYSIS_WINDOW) leftYHistory.shift();
            } else {
                rightYHistory.push(y);
                if (rightYHistory.length > ANALYSIS_WINDOW) rightYHistory.shift();
            }

            drawAll();
            updateAnalysis();
        }

        function resetTrail() {
            leftTrail = [];
            rightTrail = [];
            leftYHistory = [];
            rightYHistory = [];
            swingPeaks = [];
            drawAll();
            statusDiv.textContent = '轨迹已重置';
            setTimeout(() => { if (statusDiv.textContent === '轨迹已重置') updateStatusText(); }, 600);
        }

        // --- 获取当前视角下的坐标 ---
        function getViewCoords(p, view) {
            // p: {x, y, z}, 返回用于绘制的 {u, v}
            switch (view) {
                case 'xz': return { u: p.x, v: 1 - p.z };      // 俯视
                case 'yz': return { u: 1 - p.z, v: p.y };      // 侧面
                default:  return { u: p.x, v: p.y };           // 正常
            }
        }

        // --- 绘制单个轨迹画布 ---
        function drawTrailOnCanvas(ctx, trail, color, view, label) {
            const w = ctx.canvas.width, h = ctx.canvas.height;
            ctx.clearRect(0, 0, w, h);

            // 网格线
            ctx.strokeStyle = '#1a1a2e';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= 4; i++) {
                const pos = i / 4;
                ctx.beginPath();
                ctx.moveTo(pos * w, 0); ctx.lineTo(pos * w, h); ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, pos * h); ctx.lineTo(w, pos * h); ctx.stroke();
            }

            if (trail.length < 2) {
                ctx.fillStyle = '#333';
                ctx.font = '13px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('等待追踪...', w / 2, h / 2);
                return;
            }

            // 连线
            for (let i = 1; i < trail.length; i++) {
                const p1 = getViewCoords(trail[i - 1], view);
                const p2 = getViewCoords(trail[i], view);
                const alpha = 0.15 + 0.85 * (i / trail.length);
                ctx.beginPath();
                ctx.moveTo(p1.u * w, p1.v * h);
                ctx.lineTo(p2.u * w, p2.v * h);
                ctx.strokeStyle = color.replace(')', `, ${alpha})`).replace('rgb', 'rgba');
                if (color.startsWith('#')) {
                    ctx.strokeStyle = hexToRgba(color, alpha);
                } else {
                    ctx.strokeStyle = color;
                }
                ctx.lineWidth = 2.5;
                ctx.lineCap = 'round';
                ctx.stroke();
            }

            // 点
            for (let i = 0; i < trail.length; i++) {
                const p = getViewCoords(trail[i], view);
                const radius = 2 + 5 * (i / trail.length);
                const alpha = 0.2 + 0.8 * (i / trail.length);
                const gradient = ctx.createRadialGradient(
                    p.u * w, p.v * h, 0,
                    p.u * w, p.v * h, radius
                );
                gradient.addColorStop(0, color);
                gradient.addColorStop(1, hexToRgba(color, alpha * 0.5));
                ctx.beginPath();
                ctx.arc(p.u * w, p.v * h, radius, 0, 2 * Math.PI);
                ctx.fillStyle = gradient;
                ctx.shadowColor = hexToRgba(color, alpha * 0.3);
                ctx.shadowBlur = 8;
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            // 当前点（最后一个点）高亮
            if (trail.length > 0) {
                const last = getViewCoords(trail[trail.length - 1], view);
                ctx.beginPath();
                ctx.arc(last.u * w, last.v * h, 8, 0, 2 * Math.PI);
                ctx.fillStyle = '#fff';
                ctx.fill();
                ctx.beginPath();
                ctx.arc(last.u * w, last.v * h, 5, 0, 2 * Math.PI);
                ctx.fillStyle = color;
                ctx.fill();
            }

            ctx.fillStyle = '#555';
            ctx.font = '11px monospace';
            ctx.textAlign = 'right';
            ctx.fillText(`${label}: ${trail.length}`, w - 8, 16);
        }

        function drawOverlay() {
            const view = viewSelect.value;
            drawTrailOnCanvas(overlayCtx, leftTrail, leftColor, view, 'L');
            // 叠加右手
            const w = overlayCvs.width, h = overlayCvs.height;
            // 右手轨迹叠加上去
            if (rightTrail.length >= 2) {
                for (let i = 1; i < rightTrail.length; i++) {
                    const p1 = getViewCoords(rightTrail[i - 1], view);
                    const p2 = getViewCoords(rightTrail[i], view);
                    const alpha = 0.15 + 0.85 * (i / rightTrail.length);
                    overlayCtx.beginPath();
                    overlayCtx.moveTo(p1.u * w, p1.v * h);
                    overlayCtx.lineTo(p2.u * w, p2.v * h);
                    overlayCtx.strokeStyle = hexToRgba(rightColor, alpha);
                    overlayCtx.lineWidth = 2.5;
                    overlayCtx.lineCap = 'round';
                    overlayCtx.stroke();
                }
                for (let i = 0; i < rightTrail.length; i++) {
                    const p = getViewCoords(rightTrail[i], view);
                    const radius = 2 + 5 * (i / rightTrail.length);
                    overlayCtx.beginPath();
                    overlayCtx.arc(p.u * w, p.v * h, radius, 0, 2 * Math.PI);
                    overlayCtx.fillStyle = hexToRgba(rightColor, 0.2 + 0.8 * (i / rightTrail.length));
                    overlayCtx.fill();
                }
                // 高亮右手当前点
                const lastR = getViewCoords(rightTrail[rightTrail.length - 1], view);
                overlayCtx.beginPath();
                overlayCtx.arc(lastR.u * w, lastR.v * h, 7, 0, 2 * Math.PI);
                overlayCtx.fillStyle = '#fff';
                overlayCtx.fill();
                overlayCtx.beginPath();
                overlayCtx.arc(lastR.u * w, lastR.v * h, 4, 0, 2 * Math.PI);
                overlayCtx.fillStyle = rightColor;
                overlayCtx.fill();
            }

            overlayCtx.fillStyle = '#555';
            overlayCtx.font = '11px monospace';
            overlayCtx.textAlign = 'left';
            overlayCtx.fillText(`L:${leftTrail.length} R:${rightTrail.length}`, 8, 16);
        }

        function drawAll() {
            const view = viewSelect.value;
            drawTrailOnCanvas(leftCtx, leftTrail, leftColor, view, 'L');
            drawTrailOnCanvas(rightCtx, rightTrail, rightColor, view, 'R');
            drawOverlay();
        }

        // --- 分析：摆动幅度、频率、相位 ---
        function updateAnalysis() {
            // 左手幅度
            if (leftYHistory.length > 4) {
                const minY = Math.min(...leftYHistory);
                const maxY = Math.max(...leftYHistory);
                const amp = Math.round((maxY - minY) * 1000);
                document.getElementById('leftAmpVal').textContent = amp;
            }
            // 右手幅度
            if (rightYHistory.length > 4) {
                const minY = Math.min(...rightYHistory);
                const maxY = Math.max(...rightYHistory);
                const amp = Math.round((maxY - minY) * 1000);
                document.getElementById('rightAmpVal').textContent = amp;
            }
            // 相位差：比较左右手 Y 值趋势
            if (leftYHistory.length > 10 && rightYHistory.length > 10) {
                // 计算左右手 Y 值的相关性滞后
                const len = Math.min(leftYHistory.length, rightYHistory.length);
                let phaseSum = 0, count = 0;
                for (let i = 1; i < len; i++) {
                    const dl = leftYHistory[i] - leftYHistory[i - 1];
                    const dr = rightYHistory[i] - rightYHistory[i - 1];
                    // 如果方向相反(一上一下)，相位差接近180
                    if (Math.abs(dl) > 0.001 && Math.abs(dr) > 0.001) {
                        phaseSum += (dl * dr < 0) ? 180 : 0;
                        count++;
                    }
                }
                const phase = count > 0 ? Math.round(phaseSum / count) : 0;
                document.getElementById('phaseVal').textContent = phase + '°';
                document.getElementById('phaseVal').className = 'value ' +
                    (phase > 120 ? 'green' : phase > 60 ? 'orange' : 'pink');
            }
            // 频率：根据 Y 值过零点或峰谷检测
            if (leftYHistory.length > 10) {
                let crossings = 0;
                for (let i = 1; i < leftYHistory.length; i++) {
                    const prev = leftYHistory[i - 1];
                    const curr = leftYHistory[i];
                    const mean = leftYHistory.reduce((a, b) => a + b, 0) / leftYHistory.length;
                    if ((prev - mean) * (curr - mean) < 0) crossings++;
                }
                // 假设约 30fps
                const fps = 30;
                const freq = (crossings / 2) / (leftYHistory.length / fps);
                document.getElementById('freqVal').textContent = freq.toFixed(1);
            }
            // 总点数
            document.getElementById('pointCount').textContent = leftTrail.length + rightTrail.length;
        }

        // --- 颜色工具 ---
        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        // --- 手部检测回调 ---
        function onHandResults(results) {
            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                return;
            }

            const landmarks = results.multiHandLandmarks;
            const handedness = results.multiHandedness;

            for (let i = 0; i < landmarks.length; i++) {
                const lm = landmarks[i];
                const hand = handedness[i];
                const label = hand.label; // 'Left' 或 'Right'
                const wrist = lm[0];  // 手腕
                const tip = lm[8];    // 食指指尖

                // 使用手腕位置来判断摆动（比指尖更稳定）
                // 同时用指尖作为辅助
                const x = (wrist.x + tip.x) / 2;
                const y = (wrist.y + tip.y) / 2;
                const z = (wrist.z + tip.z) / 2;

                // MediaPipe handedness: 'Left' = 左手, 'Right' = 右手
                addTrailPoint(label === 'Left' ? 'left' : 'right', x, y, z);
            }

            if (statusDiv.textContent.includes('加载') || statusDiv.textContent.includes('等待')) {
                updateStatusText();
            }
        }

        // --- 摄像头 ---
        function startCamera() {
            if (camera) camera.stop();
            camera = new Camera(video, {
                onFrame: async () => {
                    if (handDetector) {
                        await handDetector.send({ image: video });
                    }
                },
                width: 640,
                height: 480
            });
            camera.start().then(() => {
                statusDiv.textContent = '摄像头已启动';
            }).catch(err => {
                statusDiv.textContent = '摄像头错误: ' + err.message;
                statusDiv.style.borderLeftColor = '#f85149';
                statusDiv.style.color = '#f85149';
            });
        }

        function updateStatusText() {
            statusDiv.textContent = '双手追踪中';
            statusDiv.style.borderLeftColor = '#3fb950';
            statusDiv.style.color = '#3fb950';
        }

        // --- 初始化 ---
        async function initHands() {
            statusDiv.textContent = '加载手部模型...';
            statusDiv.style.borderLeftColor = '#d2991d';
            statusDiv.style.color = '#d2991d';

            handDetector = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });
            handDetector.setOptions({
                maxNumHands: 2,          // 追踪双手
                modelComplexity: 1,
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.6
            });
            handDetector.onResults(onHandResults);
            updateStatusText();
        }

        // --- 事件监听 ---
        viewSelect.addEventListener('change', drawAll);
        document.getElementById('resetBtn').addEventListener('click', resetTrail);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R') resetTrail();
            if (e.key === 'f' || e.key === 'F') {
                if (document.fullscreenElement) {
                    document.exitFullscreen();
                } else {
                    document.documentElement.requestFullscreen();
                }
            }
        });

        window.addEventListener('resize', drawAll);

        // --- 启动 ---
        window.onload = async () => {
            drawAll();
            await initHands();
            startCamera();
        };
    </script>
</body>
</html>
