<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>保龄球轨迹分析系统</title>

    <!-- TensorFlow.js + COCO-SSD (本地离线版) -->
    <script src="libs/tensorflow/tf.min.js"></script>
    <script src="libs/tensorflow/coco-ssd.min.js"></script>

    <style>
        :root {
            --bg: #0d1117;
            --card-bg: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --text-dim: #8b949e;
            --accent: #f0883e;
            --accent2: #58a6ff;
            --green: #3fb950;
            --red: #f85149;
            --yellow: #d2991d;
            --lane-wood: #c8a45c;
            --lane-dark: #5a3e28;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
        }

        /* ===== 头部 ===== */
        .header {
            text-align: center;
            margin-bottom: 12px;
        }
        .header h1 {
            font-size: 2em;
            font-weight: 300;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 4px;
        }
        .header .subtitle {
            font-size: 13px;
            color: var(--text-dim);
        }

        /* ===== 主布局 ===== */
        .main-layout {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            max-width: 1500px;
            width: 100%;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 14px;
            border: 1px solid var(--border);
            box-shadow: 0 6px 20px rgba(0,0,0,0.5);
        }
        .card h3 {
            text-align: center;
            font-weight: 300;
            font-size: 14px;
            color: var(--text-dim);
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        /* ===== 视频区 ===== */
        .video-panel {
            flex: 1 1 520px;
            min-width: 380px;
            max-width: 640px;
        }
        .video-wrapper {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }
        .video-wrapper video {
            display: block;
            width: 100%;
            height: auto;
            transform: rotateY(180deg);
            -webkit-transform: rotateY(180deg);
        }
        .video-wrapper canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* ===== 轨迹面板 ===== */
        .trail-panel {
            flex: 1 1 480px;
            min-width: 380px;
            max-width: 640px;
        }
        .trail-panel canvas {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 8px;
            background: #0a0a0f;
            cursor: crosshair;
        }

        /* ===== 工具栏 ===== */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 12px 0;
            max-width: 1500px;
            width: 100%;
        }
        .toolbar label {
            font-size: 13px;
            color: var(--text-dim);
        }
        .toolbar select, .toolbar button {
            padding: 7px 16px;
            border-radius: 6px;
            background: #21262d;
            color: var(--text);
            border: 1px solid var(--border);
            font-size: 13px;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }
        .toolbar select:focus, .toolbar button:hover {
            border-color: var(--accent);
        }
        .toolbar button {
            font-weight: 500;
        }
        .toolbar button.primary {
            background: #238636;
            border-color: #2ea043;
            color: #fff;
        }
        .toolbar button.primary:hover { background: #2ea043; }
        .toolbar button.danger {
            background: #da3633;
            border-color: #f85149;
            color: #fff;
        }
        .toolbar button.danger:hover { background: #f85149; }
        .toolbar button.accent {
            background: #9a6700;
            border-color: #d2991d;
            color: #fff;
        }
        .toolbar .status-badge {
            padding: 7px 16px;
            background: #21262d;
            border-radius: 20px;
            font-size: 13px;
            border-left: 4px solid var(--green);
            color: var(--green);
            min-width: 140px;
            text-align: center;
        }

        /* ===== 数据面板 ===== */
        .data-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            max-width: 1500px;
            width: 100%;
            margin-top: 4px;
        }
        .metric-card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 12px 20px;
            border: 1px solid var(--border);
            text-align: center;
            min-width: 100px;
            flex: 1 1 100px;
        }
        .metric-card .label {
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .metric-card .value {
            font-size: 20px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }
        .metric-card .value.speed { color: var(--accent2); }
        .metric-card .value.pos { color: var(--accent); }
        .metric-card .value.rpm { color: var(--yellow); }
        .metric-card .value.time { color: var(--green); }
        .metric-card .unit {
            font-size: 10px;
            color: var(--text-dim);
        }

        /* ===== 检测参数面板 ===== */
        .params-panel {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 10px 16px;
            border: 1px solid var(--border);
            max-width: 1500px;
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }
        .params-panel .param-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .params-panel label {
            color: var(--text-dim);
            white-space: nowrap;
        }
        .params-panel input[type="range"] {
            width: 100px;
            accent-color: var(--accent);
        }
        .params-panel input[type="color"] {
            width: 28px;
            height: 24px;
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            background: transparent;
            padding: 1px;
        }
        .params-panel span.val {
            color: var(--accent);
            min-width: 28px;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        /* ===== 页脚 ===== */
        .footer {
            margin-top: 14px;
            font-size: 12px;
            color: #484f58;
            text-align: center;
        }
        .footer kbd {
            background: #21262d;
            padding: 2px 8px;
            border-radius: 4px;
            color: var(--text);
            border: 1px solid var(--border);
        }

        /* ===== 响应式 ===== */
        @media (max-width: 850px) {
            .main-layout { flex-direction: column; align-items: center; }
            .video-panel, .trail-panel { flex: 1 1 auto; width: 100%; max-width: 100%; }
            .header h1 { font-size: 1.5em; }
        }
    </style>
</head>
<body>

    <!-- 头部 -->
    <div class="header">
        <h1>保龄球轨迹分析系统</h1>
        <p class="subtitle">实时追踪保龄球运动轨迹 · 速度分析 · 拐点检测</p>
    </div>

    <!-- 主布局 -->
    <div class="main-layout">
        <!-- 左：摄像头 -->
        <div class="card video-panel">
            <h3>摄像头画面</h3>
            <div class="video-wrapper">
                <video id="webcam" playsinline></video>
                <canvas id="detectOverlay"></canvas>
            </div>
        </div>

        <!-- 右：轨迹画布 -->
        <div class="card trail-panel">
            <h3>运动轨迹 (俯视图) <button id="rotateTrailBtn" class="accent" style="font-size:11px;padding:2px 8px;margin-left:8px;">旋转视角</button><span id="rotateAngle" style="color:var(--text-dim);font-size:11px;margin-left:6px;"></span></h3>
            <canvas id="trailCanvas" width="640" height="400"></canvas>
        </div>
    </div>

    <!-- 工具栏 -->
    <div class="toolbar">
        <label for="modeSelect">检测模式:</label>
        <select id="modeSelect">
            <option value="diff">帧差分追踪</option>
            <option value="ai">AI 检测 (COCO-SSD)</option>
            <option value="ai_color">AI + 颜色过滤</option>
            <option value="color">颜色分割</option>
        </select>

        <label for="laneSelect">球道识别:</label>
        <select id="laneSelect">
            <option value="none">无</option>
            <option value="manual">手动标定</option>
        </select>

        <button id="loadVideoBtn" class="accent">加载视频</button>
        <input type="file" id="videoFileInput" accept="video/*" style="display:none;">
        <button id="cameraBtn" class="accent">启动摄像头</button>
        <button id="switchCameraBtn" class="accent" style="display:none;">切换摄像头</button>
        <button id="extractBtn" class="primary">提取轨迹</button>
        <button id="playbackBtn" class="accent">轨迹回放</button>
        <button id="resetBtn" class="danger">重置 (R)</button>

        <div class="status-badge" id="statusBadge">等待启动...</div>
    </div>

    <!-- 检测参数 -->
    <div class="params-panel" id="paramsPanel">
        <div class="param-group">
            <label>目标颜色:</label>
            <input type="color" id="targetColor" value="#ff8800">
        </div>
        <div class="param-group">
            <label>颜色容差:</label>
            <input type="range" id="colorTolerance" min="10" max="120" value="50">
            <span class="val" id="toleranceVal">50</span>
        </div>
        <div class="param-group">
            <label>平滑系数:</label>
            <input type="range" id="smoothFactor" min="0.1" max="0.9" step="0.05" value="0.65">
            <span class="val" id="smoothVal">0.65</span>
        </div>
        <div class="param-group">
            <label>最小置信度:</label>
            <input type="range" id="minConfidence" min="0.1" max="0.9" step="0.05" value="0.35">
            <span class="val" id="confVal">0.35</span>
        </div>
        <div class="param-group">
            <label>轨迹保留:</label>
            <input type="range" id="maxPoints" min="30" max="300" step="10" value="150">
            <span class="val" id="pointsVal">150</span>
        </div>
    </div>

    <!-- 数据面板 -->
    <div class="data-panel">
        <div class="metric-card">
            <div class="label">当前速度</div>
            <div class="value speed" id="currentSpeed">--</div>
            <div class="unit">mph</div>
        </div>
        <div class="metric-card">
            <div class="label">犯规线速度</div>
            <div class="value speed" id="foulSpeed">--</div>
            <div class="unit">mph</div>
        </div>
        <div class="metric-card">
            <div class="label">球位置 X</div>
            <div class="value pos" id="ballX">--</div>
            <div class="unit">board</div>
        </div>
        <div class="metric-card">
            <div class="label">球位置 Y</div>
            <div class="value pos" id="ballY">--</div>
            <div class="unit">ft</div>
        </div>
        <div class="metric-card">
            <div class="label">转速</div>
            <div class="value rpm" id="ballRPM">--</div>
            <div class="unit">RPM</div>
        </div>
        <div class="metric-card">
            <div class="label">已运行时间</div>
            <div class="value time" id="elapsedTime">0.00</div>
            <div class="unit">秒</div>
        </div>
        <div class="metric-card">
            <div class="label">拐点距离</div>
            <div class="value pos" id="breakPoint">--</div>
            <div class="unit">ft</div>
        </div>
        <div class="metric-card">
            <div class="label">入射角</div>
            <div class="value pos" id="entryAngle">--</div>
            <div class="unit">°</div>
        </div>
    </div>

    <div class="footer">
        按 <kbd>R</kbd> 重置轨迹 | 按 <kbd>Space</kbd> 开始/停止追踪 | 按 <kbd>P</kbd> 轨迹回放
    </div>

    <script>
        // ==================== DOM 元素 ====================
        const video = document.getElementById('webcam');
        const detectOverlay = document.getElementById('detectOverlay');
        const detectCtx = detectOverlay.getContext('2d');
        const trailCanvas = document.getElementById('trailCanvas');
        const trailCtx = trailCanvas.getContext('2d');
        const statusBadge = document.getElementById('statusBadge');
        const modeSelect = document.getElementById('modeSelect');
        const laneSelect = document.getElementById('laneSelect');

        // 参数元素
        const targetColorInput = document.getElementById('targetColor');
        const colorToleranceInput = document.getElementById('colorTolerance');
        const smoothFactorInput = document.getElementById('smoothFactor');
        const minConfidenceInput = document.getElementById('minConfidence');
        const maxPointsInput = document.getElementById('maxPoints');

        // 数据元素
        const currentSpeedEl = document.getElementById('currentSpeed');
        const foulSpeedEl = document.getElementById('foulSpeed');
        const ballXEl = document.getElementById('ballX');
        const ballYEl = document.getElementById('ballY');
        const ballRPMEl = document.getElementById('ballRPM');
        const elapsedTimeEl = document.getElementById('elapsedTime');
        const breakPointEl = document.getElementById('breakPoint');
        const entryAngleEl = document.getElementById('entryAngle');

        // ==================== 状态变量 ====================
        let trailPoints = [];        // 轨迹点: {x, y, t, rawX, rawY}
        let currentMode = 'diff';
        let cocoDetector = null;
        let camera = null;
        let isTracking = false;
        let trackingStartTime = 0;
        let lastDetectionTime = 0;
        let lastPosition = null;     // EWA 平滑后的位置
        let rawPosition = null;      // 原始检测位置
        let ballMissCount = 0;
        let foulLineSpeed = 0;       // 犯规线速度
        let breakPointDist = 0;      // 拐点距离
        let entryAngle = 0;          // 入射角

        // 颜色检测
        let targetColor = '#ff8800';
        let colorTolerance = 50;
        let smoothFactor = 0.65;
        let minConfidence = 0.35;
        let maxPoints = 150;

        // 视频文件模式
        let isVideoFileMode = false;
        let videoFileURL = null;

        // 回放
        let isPlaybackMode = false;
        let playbackIndex = 0;
        let playbackTimer = null;
        let savedTrail = [];

        // ===== 帧差分追踪状态 =====
        let prevFrameGray = null;    // 上一帧灰度图数据
        let diffCanvas = null;       // 离屏canvas用于帧差分
        let diffCtx = null;
        let prevBallPos = null;      // 上一帧球位置 (用于连续性)
        let allTrajectories = [];    // 所有候选轨迹

        // ===== 摄像头切换 =====
        let currentFacingMode = 'user'; // 'user' 或 'environment'

        // ===== 转速计算 =====
        let prevBallROI = null;       // 上一帧球区域灰度图
        let prevBallCenter = null;    // 上一帧球中心
        let ballRPM = 0;              // 当前转速
        let rpmWindow = [];           // 转速滑动窗口
        const RPM_ROI_SIZE = 40;      // 转速分析区域大小

        // 球道标定 (手动四个角点归一化坐标)
        let laneCorners = null; // [{x,y}, {x,y}, {x,y}, {x,y}] 左上、右上、右下、左下

        // ===== 轨迹旋转 =====
        let trailRotation = 0;       // 当前旋转角度 (度)
        let isRotating = false;      // 是否正在旋转模式
        let rotateStartX = 0;
        let rotateStartAngle = 0;

        // 球道参考线 (归一化坐标, 用于绘制)
        // 球瓶区固定在顶部 (画面y=0附近), 犯规线在底部 (画面y=1附近)
        // ballDirection: +1 = 球向画面底部移动, -1 = 球向画面顶部移动
        const PIN_DECK_Y = 0.08;     // 球瓶区 (画布顶部)
        const ARROWS_Y = 0.65;       // 箭头标记
        const FOUL_LINE_Y = 0.90;    // 犯规线 (画布底部)
        let ballDirection = 0;       // 自动检测: +1向下, -1向上, 0未检测

        // ==================== 球运动方向检测 ====================
        function detectBallDirection() {
            if (trailPoints.length < 8) return;
            const ys = trailPoints.slice(-8).map(p => p.y);
            const dy = ys[ys.length - 1] - ys[0];
            if (Math.abs(dy) > 0.02) {
                ballDirection = dy > 0 ? 1 : -1;
            }
        }

        // ==================== 工具函数 ====================
        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1,3), 16);
            const g = parseInt(hex.slice(3,5), 16);
            const b = parseInt(hex.slice(5,7), 16);
            return { r, g, b };
        }

        function colorDistance(r1, g1, b1, r2, g2, b2) {
            return Math.sqrt(
                (r1 - r2) ** 2 + (g1 - g2) ** 2 + (b1 - b2) ** 2
            );
        }

        function clamp(v, min, max) {
            return Math.min(max, Math.max(min, v));
        }

        // EWA 指数加权平均平滑
        function ewaSmooth(current, previous, factor) {
            if (!previous) return current;
            return {
                x: previous.x + factor * (current.x - previous.x),
                y: previous.y + factor * (current.y - previous.y)
            };
        }

        // ==================== 轨迹管理 ====================
        function addTrailPoint(rawX, rawY, timestamp) {
            if (!isTracking && !isPlaybackMode) return;

            const now = timestamp || performance.now();

            // 归一化坐标
            const point = {
                rawX: rawX,
                rawY: rawY,
                x: clamp(rawX / video.videoWidth, 0, 1),
                y: clamp(rawY / video.videoHeight, 0, 1),
                t: now
            };

            trailPoints.push(point);
            if (trailPoints.length > maxPoints) {
                trailPoints.shift();
            }

            // 更新 EWA 平滑
            lastPosition = ewaSmooth(point, lastPosition, smoothFactor);

            // 检测球的运动方向
            detectBallDirection();

            // 更新速度
            updateSpeed();
            // 更新拐点
            updateBreakPoint();
            // 更新入射角
            updateEntryAngle();

            drawTrail();
            updateDataPanel();
        }

        function resetTrail() {
            trailPoints = [];
            lastPosition = null;
            rawPosition = null;
            lastDetectionTime = 0;
            trackingStartTime = 0;
            foulLineSpeed = 0;
            breakPointDist = 0;
            entryAngle = 0;
            ballMissCount = 0;
            ballDirection = 0;
            prevFrameGray = null;
            prevBallPos = null;
            prevBallROI = null;
            prevBallCenter = null;
            ballRPM = 0;
            rpmWindow = [];
            stopPlayback();
            drawTrail();
            updateDataPanel();
            setStatus('轨迹已重置', 'green');
        }

        function startTracking() {
            if (!isTracking) {
                isTracking = true;
                trackingStartTime = performance.now();
                setStatus('追踪中...', 'green');
            }
        }

        function stopTracking() {
            isTracking = false;
            setStatus('追踪已暂停', 'yellow');
        }

        // ==================== 速度计算 ====================
        function updateSpeed() {
            if (trailPoints.length < 2) return;

            const len = trailPoints.length;
            const p1 = trailPoints[Math.max(0, len - 10)];
            const p2 = trailPoints[len - 1];
            const dt = (p2.t - p1.t) / 1000; // 秒

            if (dt < 0.01) return;

            // 像素距离
            const dx = p2.rawX - p1.rawX;
            const dy = p2.rawY - p1.rawY;
            const pixelDist = Math.sqrt(dx * dx + dy * dy);

            // 像素到英尺的近似转换 (基于球道标准尺寸)
            // 球道宽 42英寸 = 3.5英尺, 假设视频中球道约占画面宽度
            const pixelPerFt = video.videoWidth / 4; // 粗略估计
            const distFt = pixelDist / pixelPerFt;
            const speedFps = distFt / dt;
            const speedMph = speedFps * 0.681818; // ft/s to mph

            // 更新犯规线速度 (根据球运动方向自适应)
            // ballDirection>0: 球向画面底部移动(前摄像头), 犯规线在y=0.90
            // ballDirection<0: 球向画面顶部移动(后摄像头), 犯规线在y=0.10
            const foulY = ballDirection < 0 ? (1 - FOUL_LINE_Y) : FOUL_LINE_Y;
            if (ballDirection < 0) {
                if (p2.y > foulY && p1.y <= foulY) {
                    foulLineSpeed = speedMph;
                }
            } else {
                if (p2.y < foulY && p1.y >= foulY) {
                    foulLineSpeed = speedMph;
                }
            }
        }

        function updateBreakPoint() {
            if (trailPoints.length < 5) return;
            // 拐点：轨迹中 X 方向变化率最大的点
            let maxChange = 0;
            for (let i = 2; i < trailPoints.length - 2; i++) {
                const dx1 = trailPoints[i].x - trailPoints[i-2].x;
                const dx2 = trailPoints[i+2].x - trailPoints[i].x;
                const change = Math.abs(dx2 - dx1);
                if (change > maxChange) {
                    maxChange = change;
                    breakPointDist = trailPoints[i].y * 60; // 归一化到英尺
                }
            }
        }

        function updateEntryAngle() {
            if (trailPoints.length < 5) return;
            const len = trailPoints.length;
            const recent = trailPoints.slice(Math.max(0, len - 5));
            if (recent.length < 2) return;
            const dx = recent[recent.length-1].x - recent[0].x;
            const dy = recent[recent.length-1].y - recent[0].y;
            // 方向角度 (相对于前进方向)
            entryAngle = (Math.atan2(dx, dy) * 180 / Math.PI).toFixed(1);
        }

        // ==================== 绘制轨迹 ====================
        function drawTrail() {
            const w = trailCanvas.width, h = trailCanvas.height;
            trailCtx.save();
            trailCtx.clearRect(0, 0, w, h);

            // 应用旋转
            if (trailRotation !== 0) {
                trailCtx.translate(w / 2, h / 2);
                trailCtx.rotate(trailRotation * Math.PI / 180);
                trailCtx.translate(-w / 2, -h / 2);
            }

            // 绘制球道背景
            drawLaneOnTrail(w, h);

            if (trailPoints.length < 2) {
                trailCtx.fillStyle = '#444';
                trailCtx.font = '15px sans-serif';
                trailCtx.textAlign = 'center';
                trailCtx.fillText('等待追踪数据...', w/2, h/2);
                return;
            }

            // 连线 (俯视图: 球瓶区=顶部, 犯规线=底部)
            for (let i = 1; i < trailPoints.length; i++) {
                const p1 = trailPoints[i-1], p2 = trailPoints[i];
                const alpha = 0.15 + 0.85 * (i / trailPoints.length);
                trailCtx.beginPath();
                trailCtx.moveTo(p1.x * w, p1.y * h);
                trailCtx.lineTo(p2.x * w, p2.y * h);
                trailCtx.strokeStyle = `rgba(240, 136, 62, ${alpha})`;
                trailCtx.lineWidth = 3;
                trailCtx.lineCap = 'round';
                trailCtx.stroke();
            }

            // 点
            for (let i = 0; i < trailPoints.length; i++) {
                const p = trailPoints[i];
                const px = p.x * w, py = p.y * h;
                const radius = 2 + 5 * (i / trailPoints.length);
                const alpha = 0.3 + 0.7 * (i / trailPoints.length);
                const gradient = trailCtx.createRadialGradient(
                    px - radius/2, py - radius/2, 0,
                    px, py, radius
                );
                gradient.addColorStop(0, `rgba(255, 180, 80, ${alpha})`);
                gradient.addColorStop(1, `rgba(240, 100, 30, ${alpha * 0.7})`);
                trailCtx.beginPath();
                trailCtx.arc(px, py, radius, 0, 2 * Math.PI);
                trailCtx.fillStyle = gradient;
                trailCtx.shadowColor = `rgba(240, 136, 62, ${alpha * 0.3})`;
                trailCtx.shadowBlur = 10;
                trailCtx.fill();
                trailCtx.shadowBlur = 0;
            }

            // 最新点高亮
            const last = trailPoints[trailPoints.length - 1];
            const lx = last.x * w, ly = last.y * h;
            trailCtx.beginPath();
            trailCtx.arc(lx, ly, 9, 0, 2 * Math.PI);
            trailCtx.fillStyle = '#fff';
            trailCtx.fill();
            trailCtx.beginPath();
            trailCtx.arc(lx, ly, 6, 0, 2 * Math.PI);
            trailCtx.fillStyle = '#f0883e';
            trailCtx.fill();

            // 拐点标记
            if (breakPointDist > 0) {
                const bpY = breakPointDist / 60 * h;
                trailCtx.beginPath();
                trailCtx.arc(w / 2, bpY, 6, 0, 2 * Math.PI);
                trailCtx.fillStyle = '#d2991d';
                trailCtx.strokeStyle = '#fff';
                trailCtx.lineWidth = 2;
                trailCtx.fill();
                trailCtx.stroke();
                trailCtx.fillStyle = '#d2991d';
                trailCtx.font = '11px monospace';
                trailCtx.textAlign = 'left';
                trailCtx.fillText(`拐点 ${breakPointDist.toFixed(0)}ft`, w / 2 + 12, bpY + 4);
            }

            trailCtx.fillStyle = '#666';
            trailCtx.font = '12px monospace';
            trailCtx.textAlign = 'right';
            trailCtx.fillText(`点数: ${trailPoints.length}`, w - 10, 20);

            trailCtx.restore();
        }

        // 绘制球道参考线 (带距离刻度 + 方向箭头)
        function drawLaneOnTrail(w, h) {
            const foulY = FOUL_LINE_Y * h;
            const arrowY = ARROWS_Y * h;
            const pinY = PIN_DECK_Y * h;

            // 球道主体
            const laneLeft = w * 0.10;
            const laneRight = w * 0.90;
            trailCtx.fillStyle = 'rgba(139, 90, 43, 0.12)';
            trailCtx.fillRect(laneLeft, 0, laneRight - laneLeft, h);

            // 球沟
            trailCtx.fillStyle = 'rgba(50, 30, 15, 0.25)';
            trailCtx.fillRect(0, 0, laneLeft, h);
            trailCtx.fillRect(laneRight, 0, w - laneRight, h);

            // 中心线
            trailCtx.strokeStyle = 'rgba(255, 255, 255, 0.06)';
            trailCtx.lineWidth = 1;
            trailCtx.setLineDash([2, 8]);
            trailCtx.beginPath();
            trailCtx.moveTo(w / 2, 0);
            trailCtx.lineTo(w / 2, h);
            trailCtx.stroke();
            trailCtx.setLineDash([]);

            // 犯规线 (粗实线)
            trailCtx.strokeStyle = 'rgba(255, 80, 60, 0.7)';
            trailCtx.lineWidth = 3;
            trailCtx.setLineDash([]);
            trailCtx.beginPath();
            trailCtx.moveTo(laneLeft, foulY);
            trailCtx.lineTo(laneRight, foulY);
            trailCtx.stroke();
            // 标签
            trailCtx.fillStyle = '#f85149';
            trailCtx.font = 'bold 11px sans-serif';
            trailCtx.textAlign = 'right';
            trailCtx.fillText('犯规线', laneLeft - 6, foulY + 4);

            // 球瓶区 (点线)
            trailCtx.strokeStyle = 'rgba(255, 220, 80, 0.6)';
            trailCtx.lineWidth = 2;
            trailCtx.setLineDash([3, 5]);
            trailCtx.beginPath();
            trailCtx.moveTo(laneLeft, pinY);
            trailCtx.lineTo(laneRight, pinY);
            trailCtx.stroke();
            trailCtx.setLineDash([]);
            trailCtx.fillStyle = '#d2991d';
            trailCtx.textAlign = 'right';
            trailCtx.fillText('球瓶区', laneLeft - 6, pinY + 4);

            // 箭头标记
            trailCtx.strokeStyle = 'rgba(200, 200, 200, 0.3)';
            trailCtx.lineWidth = 1;
            trailCtx.setLineDash([4, 6]);
            trailCtx.beginPath();
            trailCtx.moveTo(laneLeft, arrowY);
            trailCtx.lineTo(laneRight, arrowY);
            trailCtx.stroke();
            trailCtx.setLineDash([]);
            trailCtx.fillStyle = 'rgba(200,200,200,0.5)';
            trailCtx.fillText('箭头', laneLeft - 6, arrowY + 4);

            // ===== 距离刻度尺 (右侧) =====
            const tickX = laneRight + 12;
            for (let ft = 0; ft <= 60; ft += 10) {
                const y = (ft / 60) * h;
                const tickLen = ft % 15 === 0 ? 14 : 7;
                trailCtx.strokeStyle = 'rgba(255,255,255,0.2)';
                trailCtx.lineWidth = 1;
                trailCtx.setLineDash([]);
                trailCtx.beginPath();
                trailCtx.moveTo(tickX, y);
                trailCtx.lineTo(tickX + tickLen, y);
                trailCtx.stroke();
                trailCtx.fillStyle = 'rgba(255,255,255,0.4)';
                trailCtx.font = '9px monospace';
                trailCtx.textAlign = 'left';
                trailCtx.fillText(`${ft}ft`, tickX + 18, y + 4);
            }

            // ===== 板数标记 (底部) =====
            trailCtx.fillStyle = 'rgba(255, 255, 255, 0.15)';
            trailCtx.font = '9px monospace';
            trailCtx.textAlign = 'center';
            for (let board = 0; board <= 40; board += 5) {
                const x = laneLeft + (laneRight - laneLeft) * (board / 40);
                trailCtx.fillText(board, x, h - 6);
            }

            // ===== 方向箭头 (球瓶区附近) =====
            const arrowCenterX = laneLeft + (laneRight - laneLeft) * 0.5;
            const arrowBaseY = pinY + 35;
            // 画箭头指向球瓶
            trailCtx.fillStyle = 'rgba(255,220,80,0.7)';
            trailCtx.beginPath();
            trailCtx.moveTo(arrowCenterX, arrowBaseY - 18);
            trailCtx.lineTo(arrowCenterX - 8, arrowBaseY + 2);
            trailCtx.lineTo(arrowCenterX + 8, arrowBaseY + 2);
            trailCtx.closePath();
            trailCtx.fill();
            trailCtx.fillStyle = 'rgba(255,220,80,0.9)';
            trailCtx.font = 'bold 10px sans-serif';
            trailCtx.textAlign = 'center';
            trailCtx.fillText('▲ 球瓶', arrowCenterX, arrowBaseY + 16);

            // ===== 图例 =====
            const legendX = 8, legendY = 12;
            trailCtx.fillStyle = 'rgba(0,0,0,0.5)';
            trailCtx.fillRect(legendX - 2, legendY - 2, 105, 55);
            trailCtx.fillStyle = 'rgba(200,200,200,0.8)';
            trailCtx.font = '9px sans-serif';
            trailCtx.textAlign = 'left';
            const dirText = ballDirection === 0 ? '方向: 检测中...'
                : ballDirection < 0 ? '方向: ↑ 向球瓶区' : '方向: ↓ 向球瓶区';
            trailCtx.fillText('球道俯视图', legendX + 2, legendY + 12);
            trailCtx.fillText(dirText, legendX + 2, legendY + 26);
            trailCtx.fillText('0ft=犯规线 60ft=球瓶', legendX + 2, legendY + 40);
        }

        // ==================== 更新数据面板 ====================
        function updateDataPanel() {
            const len = trailPoints.length;

            if (len > 0) {
                const last = trailPoints[len - 1];
                // X 位置: 映射到板号 (0-40)
                const boardNum = Math.round(last.x * 40);
                ballXEl.textContent = boardNum;
                // Y 位置: 归一化到英尺
                const yFt = (last.y * 60).toFixed(1);
                ballYEl.textContent = yFt;
            } else {
                ballXEl.textContent = '--';
                ballYEl.textContent = '--';
            }

            // 速度
            if (len >= 2) {
                const p1 = trailPoints[Math.max(0, len - 10)];
                const p2 = trailPoints[len - 1];
                const dt = (p2.t - p1.t) / 1000;
                if (dt > 0.01) {
                    const dx = Math.abs(p2.rawX - p1.rawX);
                    const dy = Math.abs(p2.rawY - p1.rawY);
                    const pixelDist = Math.sqrt(dx * dx + dy * dy);
                    const pixelPerFt = video.videoWidth / 4;
                    const distFt = pixelDist / pixelPerFt;
                    const speedFps = distFt / dt;
                    const speedMph = (speedFps * 0.681818).toFixed(1);
                    currentSpeedEl.textContent = speedMph;
                }
            }

            foulSpeedEl.textContent = foulLineSpeed > 0 ? foulLineSpeed.toFixed(1) : '--';
            updateBallRPM();
            breakPointEl.textContent = breakPointDist > 0 ? breakPointDist.toFixed(0) : '--';
            entryAngleEl.textContent = entryAngle || '--';

            if (isTracking && trackingStartTime > 0) {
                const elapsed = ((performance.now() - trackingStartTime) / 1000).toFixed(2);
                elapsedTimeEl.textContent = elapsed;
            }
        }

        // ==================== 转速计算 ====================
        function extractBallROI(videoEl, result) {
            // 在球周围提取ROI用于转速分析
            if (!diffCanvas) {
                diffCanvas = document.createElement('canvas');
                diffCtx = diffCanvas.getContext('2d');
            }
            const size = RPM_ROI_SIZE;
            const x = Math.max(0, Math.floor(result.x - size / 2));
            const y = Math.max(0, Math.floor(result.y - size / 2));
            const w = Math.min(videoEl.videoWidth - x, size);
            const h = Math.min(videoEl.videoHeight - y, size);
            if (w < 10 || h < 10) return null;

            diffCanvas.width = w;
            diffCanvas.height = h;
            diffCtx.drawImage(videoEl, x, y, w, h, 0, 0, w, h);
            const imgData = diffCtx.getImageData(0, 0, w, h);
            const gray = new Float32Array(w * h);
            for (let i = 0; i < w * h; i++) {
                gray[i] = (imgData.data[i * 4] + imgData.data[i * 4 + 1] + imgData.data[i * 4 + 2]) / 3;
            }
            return { gray, w, h, cx: result.x - x, cy: result.y - y };
        }

        function computeCorrelation(roi1, roi2, angleOffset) {
            // 计算将roi2旋转angleOffset度后与roi1的相关性
            const { gray: g1, w, h, cx, cy } = roi1;
            const { gray: g2 } = roi2;
            const rad = angleOffset * Math.PI / 180;
            const cos = Math.cos(rad), sin = Math.sin(rad);
            let sum = 0, count = 0;
            const sampleStep = 3;

            for (let y = 0; y < h; y += sampleStep) {
                for (let x = 0; x < w; x += sampleStep) {
                    // 将roi2坐标绕中心旋转后采样
                    const rx = cx + (x - cx) * cos - (y - cy) * sin;
                    const ry = cy + (x - cx) * sin + (y - cy) * cos;
                    const ix = Math.round(rx), iy = Math.round(ry);
                    if (ix >= 0 && ix < w && iy >= 0 && iy < h) {
                        sum += Math.abs(g2[iy * w + ix] - g1[y * w + x]);
                        count++;
                    }
                }
            }
            return count > 0 ? sum / count : Infinity;
        }

        function updateBallRPM() {
            // 显示最近计算的转速
            if (rpmWindow.length > 0) {
                ballRPM = rpmWindow.reduce((a, b) => a + b, 0) / rpmWindow.length;
                ballRPMEl.textContent = ballRPM.toFixed(0);
            } else {
                ballRPMEl.textContent = ballRPM > 0 ? ballRPM.toFixed(0) : '--';
            }
        }

        function computeFrameRPM(result, videoEl) {
            // 帧间ROI相关找旋转角度
            if (!prevBallROI || !prevBallCenter) {
                prevBallROI = extractBallROI(videoEl, result);
                prevBallCenter = { x: result.x, y: result.y };
                return;
            }

            const currROI = extractBallROI(videoEl, result);
            if (!currROI) return;

            // 尝试不同旋转角度，找最佳匹配
            let bestAngle = 0, bestCost = Infinity;
            const maxAngle = 15; // 每帧最多旋转15度
            for (let a = -maxAngle; a <= maxAngle; a += 3) {
                const cost = computeCorrelation(prevBallROI, currROI, a);
                if (cost < bestCost) { bestCost = cost; bestAngle = a; }
            }

            // 转换为RPM (假设约30fps处理速率)
            const rpm = Math.abs(bestAngle) * 30 * 60 / 360;
            rpmWindow.push(rpm);
            if (rpmWindow.length > 8) rpmWindow.shift();
            ballRPM = rpmWindow.reduce((a, b) => a + b, 0) / rpmWindow.length;

            prevBallROI = currROI;
            prevBallCenter = { x: result.x, y: result.y };
        }

        // ==================== 状态显示 ====================
        function setStatus(text, color) {
            statusBadge.textContent = text;
            statusBadge.style.borderLeftColor = `var(--${color})`;
            statusBadge.style.color = `var(--${color})`;
        }

        // ==================== 颜色检测 ====================
        function detectByColor(videoEl) {
            const offCanvas = document.createElement('canvas');
            offCanvas.width = videoEl.videoWidth;
            offCanvas.height = videoEl.videoHeight;
            const offCtx = offCanvas.getContext('2d');
            offCtx.drawImage(videoEl, 0, 0);

            const imageData = offCtx.getImageData(0, 0, offCanvas.width, offCanvas.height);
            const pixels = imageData.data;
            const target = hexToRgb(targetColor);

            let sumX = 0, sumY = 0, count = 0;

            // 采样检测 (每隔4个像素)
            for (let y = 0; y < offCanvas.height; y += 4) {
                for (let x = 0; x < offCanvas.width; x += 4) {
                    const idx = (y * offCanvas.width + x) * 4;
                    const r = pixels[idx];
                    const g = pixels[idx + 1];
                    const b = pixels[idx + 2];

                    const dist = colorDistance(r, g, b, target.r, target.g, target.b);
                    if (dist < colorTolerance) {
                        sumX += x;
                        sumY += y;
                        count++;
                    }
                }
            }

            if (count > 30) {
                return {
                    x: sumX / count,
                    y: sumY / count,
                    confidence: Math.min(1, count / 500)
                };
            }
            return null;
        }

        // ==================== AI 检测 (COCO-SSD) ====================
        async function detectByAI(videoEl) {
            if (!cocoDetector) return null;
            try {
                const predictions = await cocoDetector.detect(videoEl);
                let bestBall = null;
                let bestScore = minConfidence;

                for (const pred of predictions) {
                    if (pred.class === 'sports ball' && pred.score > bestScore) {
                        bestScore = pred.score;
                        bestBall = pred;
                    }
                }

                if (bestBall) {
                    const [x, y, w, h] = bestBall.bbox;
                    return {
                        x: x + w / 2,
                        y: y + h / 2,
                        width: w,
                        height: h,
                        confidence: bestBall.score
                    };
                }
                return null;
            } catch (err) {
                console.warn('AI检测错误:', err);
                return null;
            }
        }

        // ==================== AI + 颜色过滤 ====================
        async function detectByAIColor(videoEl) {
            const aiResult = await detectByAI(videoEl);
            if (!aiResult) return null;

            // 在 AI 检测框内验证颜色
            const offCanvas = document.createElement('canvas');
            offCanvas.width = videoEl.videoWidth;
            offCanvas.height = videoEl.videoHeight;
            const offCtx = offCanvas.getContext('2d');
            offCtx.drawImage(videoEl, 0, 0);

            const margin = 10;
            const sx = Math.max(0, Math.floor(aiResult.x - aiResult.width / 2 - margin));
            const sy = Math.max(0, Math.floor(aiResult.y - aiResult.height / 2 - margin));
            const sw = Math.min(videoEl.videoWidth - sx, Math.ceil(aiResult.width + margin * 2));
            const sh = Math.min(videoEl.videoHeight - sy, Math.ceil(aiResult.height + margin * 2));

            const imageData = offCtx.getImageData(sx, sy, sw, sh);
            const pixels = imageData.data;
            const target = hexToRgb(targetColor);

            let matchCount = 0;
            const total = pixels.length / 4;
            for (let i = 0; i < pixels.length; i += 16) {
                const r = pixels[i], g = pixels[i+1], b = pixels[i+2];
                const dist = colorDistance(r, g, b, target.r, target.g, target.b);
                if (dist < colorTolerance) matchCount++;
            }
            const colorRatio = matchCount / (total / 4);

            if (colorRatio > 0.05) {
                return { ...aiResult, colorConfidence: colorRatio };
            }
            return null;
        }

        // ==================== 帧差分追踪 (纯JS/Canvas) ====================
        // 降采样到小尺寸以加速处理
        const DIFF_SCALE = 0.2;

        function getGrayFromVideo(videoEl) {
            const vw = videoEl.videoWidth, vh = videoEl.videoHeight;
            if (vw <= 0 || vh <= 0) return null;

            if (!diffCanvas) {
                diffCanvas = document.createElement('canvas');
                diffCtx = diffCanvas.getContext('2d');
            }
            const sw = Math.max(1, Math.floor(vw * DIFF_SCALE));
            const sh = Math.max(1, Math.floor(vh * DIFF_SCALE));
            diffCanvas.width = sw;
            diffCanvas.height = sh;
            diffCtx.drawImage(videoEl, 0, 0, vw, vh, 0, 0, sw, sh);

            const imgData = diffCtx.getImageData(0, 0, sw, sh);
            const px = imgData.data;
            const gray = new Uint8Array(sw * sh);
            for (let i = 0; i < sw * sh; i++) {
                gray[i] = (px[i*4] + px[i*4+1] + px[i*4+2]) / 3 | 0;
            }
            return { gray, w: sw, h: sh, scale: DIFF_SCALE };
        }

        function findBlobsSimple(prevGray, currGray, w, h, roiTop) {
            // 计算差分并二值化
            const mask = new Uint8Array(w * h);
            let activeCount = 0;
            const th = 15;

            for (let y = roiTop; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const i = y * w + x;
                    const d = Math.abs(currGray[i] - prevGray[i]);
                    if (d > th) { mask[i] = 1; activeCount++; }
                }
            }

            if (activeCount < 20) return [];

            // 简单连通域: 找面积>=20的区域, 质心
            const visited = new Uint8Array(w * h);
            const blobs = [];

            for (let y = roiTop; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const idx = y * w + x;
                    if (!mask[idx] || visited[idx]) continue;

                    // BFS (限制最大迭代防止卡死)
                    const stack = [[x, y]];
                    visited[idx] = 1;
                    let sx = 0, sy = 0, area = 0;
                    let maxIter = 3000;

                    while (stack.length > 0 && maxIter-- > 0) {
                        const [cx, cy] = stack.pop();
                        sx += cx; sy += cy; area++;

                        for (const [dx, dy] of [[-1,0],[1,0],[0,-1],[0,1]]) {
                            const nx = cx + dx, ny = cy + dy;
                            if (nx >= 0 && nx < w && ny >= roiTop && ny < h) {
                                const ni = ny * w + nx;
                                if (mask[ni] && !visited[ni]) {
                                    visited[ni] = 1;
                                    stack.push([nx, ny]);
                                }
                            }
                        }
                    }

                    if (area >= 15 && area <= 3000) {
                        blobs.push({ cx: sx / area, cy: sy / area, area });
                    }
                }
            }
            return blobs;
        }

        let diffFrameSkip = 0;

        function detectByFrameDiff(videoEl) {
            // 每2帧处理一次，降低CPU负载
            diffFrameSkip = (diffFrameSkip + 1) % 2;
            if (diffFrameSkip !== 0) return null;

            const grayData = getGrayFromVideo(videoEl);
            if (!grayData) return null;

            const { gray, w, h, scale } = grayData;

            if (!prevFrameGray) {
                prevFrameGray = gray;
                return null;
            }

            const roiTop = Math.floor(h * 0.05);
            const blobs = findBlobsSimple(prevFrameGray, gray, w, h, roiTop);
            prevFrameGray = gray;

            if (blobs.length === 0) return null;

            // 选最靠近上一帧位置的 blob
            let best = null, bestDist = Infinity;
            const maxJump = w * 0.3;

            for (const b of blobs) {
                let dist = 0;
                if (prevBallPos) {
                    dist = Math.hypot(b.cx - prevBallPos.x, b.cy - prevBallPos.y);
                    if (dist > maxJump) continue;
                }
                // 优先选择面积适中、位置靠下的 blob
                const score = (1 - dist / maxJump) * 0.6 + Math.min(1, b.area / 200) * 0.2 + (b.cy / h) * 0.2;
                if (dist < bestDist) {
                    bestDist = dist;
                    best = {
                        x: b.cx / scale,
                        y: b.cy / scale,
                        confidence: Math.min(1, Math.max(0.3, score)),
                        width: Math.sqrt(b.area) / scale,
                        height: Math.sqrt(b.area) / scale
                    };
                }
            }

            if (best) {
                prevBallPos = { x: best.x * scale, y: best.y * scale };
            }
            return best;
        }

        // ==================== 主检测循环 ====================
        async function detectFrame(videoEl) {
            if (!isTracking || isPlaybackMode) return;

            let result = null;

            if (currentMode === 'diff') {
                result = detectByFrameDiff(videoEl);
            } else {
                switch (currentMode) {
                    case 'ai':
                        result = await detectByAI(videoEl);
                        break;
                    case 'ai_color':
                        result = await detectByAIColor(videoEl);
                        break;
                    case 'color':
                        result = detectByColor(videoEl);
                        break;
                }
            }

            if (result) {
                ballMissCount = 0;
                addTrailPoint(result.x, result.y);
                lastDetectionTime = performance.now();
                // 每3帧算一次转速 (降低计算负载)
                if (trailPoints.length % 3 === 0) {
                    computeFrameRPM(result, videoEl);
                }
                drawDetectionOverlay(result);
                const dirTag = ballDirection === 0 ? '' : ballDirection < 0 ? ' ↑向球瓶' : ' ↓向球瓶';
                setStatus(`检测中 (置信度: ${(result.confidence * 100).toFixed(0)}%)${dirTag}`, 'green');
            } else {
                ballMissCount++;
                if (ballMissCount > 30) {
                    setStatus('未检测到球体', 'yellow');
                }
                detectCtx.clearRect(0, 0, detectOverlay.width, detectOverlay.height);
            }
        }

        function drawDetectionOverlay(result) {
            detectCtx.clearRect(0, 0, detectOverlay.width, detectOverlay.height);

            if (result.width && result.height) {
                // 绘制边界框
                const x = result.x - result.width / 2;
                const y = result.y - result.height / 2;
                detectCtx.strokeStyle = '#f0883e';
                detectCtx.lineWidth = 2;
                detectCtx.strokeRect(x, y, result.width, result.height);

                // 中心点
                detectCtx.fillStyle = '#f0883e';
                detectCtx.beginPath();
                detectCtx.arc(result.x, result.y, 5, 0, 2 * Math.PI);
                detectCtx.fill();
            } else {
                // 仅中心点
                detectCtx.fillStyle = '#f0883e';
                detectCtx.beginPath();
                detectCtx.arc(result.x, result.y, 8, 0, 2 * Math.PI);
                detectCtx.fill();
                detectCtx.strokeStyle = '#fff';
                detectCtx.lineWidth = 2;
                detectCtx.stroke();
            }
        }

        // ==================== 摄像头 ====================
        async function startCamera(facingMode) {
            const fm = facingMode || currentFacingMode;
            setStatus('启动摄像头...', 'yellow');
            // 先停掉之前的摄像头
            if (camera) {
                camera.getTracks().forEach(t => t.stop());
                camera = null;
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: fm },
                    audio: false
                });
                camera = stream;
                currentFacingMode = fm;
                video.srcObject = stream;
                await video.play();
                isVideoFileMode = false;

                await new Promise(resolve => {
                    if (video.videoWidth > 0) { resolve(); return; }
                    video.addEventListener('loadedmetadata', resolve, { once: true });
                });

                detectOverlay.width = video.videoWidth;
                detectOverlay.height = video.videoHeight;

                setStatus(`摄像头就绪 (${fm === 'environment' ? '后置' : '前置'})`, 'green');
                document.getElementById('switchCameraBtn').style.display = 'inline-block';
                startDetectionLoop();
            } catch (err) {
                console.error('摄像头启动失败:', err);
                setStatus('摄像头错误: ' + err.message, 'red');
            }
        }

        function switchCamera() {
            const newFacing = currentFacingMode === 'user' ? 'environment' : 'user';
            startCamera(newFacing);
        }

        let detectionLoopRunning = false;
        let frameDebugCount = 0;

        function startDetectionLoop() {
            if (detectionLoopRunning) return;
            detectionLoopRunning = true;
            frameDebugCount = 0;
            const loop = async () => {
                if (!detectionLoopRunning) return;
                if (video.readyState >= 2) {
                    frameDebugCount++;
                    // 每60帧输出一次调试信息
                    if (frameDebugCount % 60 === 0) {
                        console.log(`[检测] 已处理${frameDebugCount}帧, isTracking=${isTracking}, 轨迹点数=${trailPoints.length}`);
                    }
                    await detectFrame(video);
                }
                requestAnimationFrame(loop);
            };
            requestAnimationFrame(loop);
            console.log('[检测] 循环已启动');
        }

        // ==================== 轨迹回放 ====================
        function startPlayback() {
            if (trailPoints.length < 2) {
                setStatus('没有足够的轨迹数据', 'yellow');
                return;
            }

            isPlaybackMode = true;
            isTracking = false;
            savedTrail = [...trailPoints];
            trailPoints = [];
            playbackIndex = 0;
            setStatus('回放中...', 'yellow');

            const playbackSpeed = 30; // ms per frame

            function playStep() {
                if (!isPlaybackMode || playbackIndex >= savedTrail.length) {
                    stopPlayback();
                    // 恢复完整轨迹
                    trailPoints = [...savedTrail];
                    drawTrail();
                    updateDataPanel();
                    setStatus('回放完成', 'green');
                    return;
                }

                trailPoints = savedTrail.slice(0, playbackIndex + 1);
                lastPosition = trailPoints[trailPoints.length - 1];
                drawTrail();
                updateDataPanel();

                playbackIndex++;
                playbackTimer = setTimeout(playStep, playbackSpeed);
            }

            playStep();
        }

        function stopPlayback() {
            isPlaybackMode = false;
            if (playbackTimer) {
                clearTimeout(playbackTimer);
                playbackTimer = null;
            }
        }

        // ==================== 球道手动标定 ====================
        let calibrating = false;
        let calibrationPoints = [];

        trailCanvas.addEventListener('click', (e) => {
            if (laneSelect.value !== 'manual' || !calibrating) return;

            const rect = trailCanvas.getBoundingClientRect();
            const scaleX = trailCanvas.width / rect.width;
            const scaleY = trailCanvas.height / rect.height;
            const x = (e.clientX - rect.left) * scaleX / trailCanvas.width;
            const y = (e.clientY - rect.top) * scaleY / trailCanvas.height;

            calibrationPoints.push({ x, y });

            if (calibrationPoints.length === 4) {
                laneCorners = [...calibrationPoints];
                calibrating = false;
                calibrationPoints = [];
                setStatus('球道标定完成 (4个角点)', 'green');
                drawTrail();
            } else {
                setStatus(`点击第 ${calibrationPoints.length + 1} 个角点...`, 'yellow');
                // 绘制已点击的点
                const w = trailCanvas.width, h = trailCanvas.height;
                trailCtx.fillStyle = '#00ff00';
                trailCtx.beginPath();
                trailCtx.arc(x * w, y * h, 6, 0, 2 * Math.PI);
                trailCtx.fill();
                trailCtx.fillStyle = '#fff';
                trailCtx.font = '12px sans-serif';
                trailCtx.fillText(calibrationPoints.length, x * w + 10, y * h - 10);
            }
        });

        // ==================== 模型加载 ====================
        async function loadModel() {
            setStatus('加载 AI 模型...', 'yellow');
            try {
                cocoDetector = await cocoSsd.load();
                setStatus('模型就绪，按 Space 开始', 'green');
            } catch (err) {
                console.error('模型加载失败:', err);
                setStatus('模型加载失败', 'red');
            }
        }

        // ==================== 事件监听 ====================
        modeSelect.addEventListener('change', (e) => {
            currentMode = e.target.value;
            setStatus(`模式切换: ${currentMode}`, 'green');
        });

        laneSelect.addEventListener('change', (e) => {
            if (e.target.value === 'manual') {
                calibrating = true;
                calibrationPoints = [];
                laneCorners = null;
                setStatus('请点击轨迹画布上的4个角点 (左上→右上→右下→左下)', 'yellow');
                drawTrail();
            } else {
                calibrating = false;
                laneCorners = null;
                drawTrail();
            }
        });

        // ==================== 视频文件加载 ====================
        function loadVideoFile(file) {
            // 清理旧资源
            if (videoFileURL) {
                URL.revokeObjectURL(videoFileURL);
                videoFileURL = null;
            }
            if (camera) {
                // 停止摄像头流
                camera.getTracks().forEach(t => t.stop());
                camera = null;
            }

            videoFileURL = URL.createObjectURL(file);
            video.srcObject = null;
            video.src = videoFileURL;
            video.loop = false;
            video.muted = false;
            isVideoFileMode = true;

            resetTrail();
            setStatus('视频已加载: ' + file.name, 'green');

            video.onloadedmetadata = () => {
                detectOverlay.width = video.videoWidth;
                detectOverlay.height = video.videoHeight;
            };

            video.onended = () => {
                stopTracking();
                setStatus('视频播放完毕', 'yellow');
            };

            // 启动检测循环 (每帧检测，帧差分模式会自动节流)
            startDetectionLoop();
        }

        document.getElementById('loadVideoBtn').addEventListener('click', () => {
            document.getElementById('videoFileInput').click();
        });

        document.getElementById('cameraBtn').addEventListener('click', () => {
            startCamera();
        });

        document.getElementById('switchCameraBtn').addEventListener('click', () => {
            switchCamera();
        });

        // ===== 轨迹旋转 =====
        function setTrailRotation(degrees) {
            trailRotation = ((degrees % 360) + 360) % 360;
            document.getElementById('rotateAngle').textContent =
                trailRotation !== 0 ? `${trailRotation.toFixed(0)}°` : '';
            drawTrail();
        }

        // 点击按钮旋转90°
        document.getElementById('rotateTrailBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            setTrailRotation(trailRotation + 90);
        });

        // 滚轮旋转
        trailCanvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            setTrailRotation(trailRotation + e.deltaY * 0.3);
        });

        // 双击重置旋转
        trailCanvas.addEventListener('dblclick', () => {
            setTrailRotation(0);
        });

        document.getElementById('videoFileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                loadVideoFile(file);
            }
        });

        document.getElementById('extractBtn').addEventListener('click', () => {
            if (isVideoFileMode) {
                video.currentTime = 0;
            }
            startTracking();
            if (isVideoFileMode) {
                video.play().catch(err => {
                    console.error('视频播放失败:', err);
                    setStatus('视频播放失败: ' + err.message, 'red');
                });
            }
        });

        document.getElementById('playbackBtn').addEventListener('click', () => {
            if (isPlaybackMode) {
                stopPlayback();
                trailPoints = [...savedTrail];
                drawTrail();
                setStatus('回放已停止', 'green');
            } else {
                startPlayback();
            }
        });

        document.getElementById('resetBtn').addEventListener('click', resetTrail);

        // 参数滑块
        targetColorInput.addEventListener('input', (e) => {
            targetColor = e.target.value;
        });

        colorToleranceInput.addEventListener('input', (e) => {
            colorTolerance = parseInt(e.target.value);
            document.getElementById('toleranceVal').textContent = colorTolerance;
        });

        smoothFactorInput.addEventListener('input', (e) => {
            smoothFactor = parseFloat(e.target.value);
            document.getElementById('smoothVal').textContent = smoothFactor;
        });

        minConfidenceInput.addEventListener('input', (e) => {
            minConfidence = parseFloat(e.target.value);
            document.getElementById('confVal').textContent = minConfidence;
        });

        maxPointsInput.addEventListener('input', (e) => {
            maxPoints = parseInt(e.target.value);
            document.getElementById('pointsVal').textContent = maxPoints;
            while (trailPoints.length > maxPoints) {
                trailPoints.shift();
            }
            drawTrail();
        });

        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;

            switch (e.key.toLowerCase()) {
                case 'r':
                    resetTrail();
                    break;
                case ' ':
                    e.preventDefault();
                    if (isTracking) {
                        stopTracking();
                        if (isVideoFileMode) video.pause();
                    } else {
                        startTracking();
                        if (isVideoFileMode) video.play().catch(err => console.error(err));
                    }
                    break;
                case 'p':
                    if (isPlaybackMode) {
                        stopPlayback();
                        trailPoints = [...savedTrail];
                        drawTrail();
                        setStatus('回放已停止', 'green');
                    } else {
                        startPlayback();
                    }
                    break;
            }
        });

        // 窗口大小变化时重绘
        window.addEventListener('resize', () => {
            drawTrail();
        });

        // ==================== 启动 ====================
        window.onload = async () => {
            drawTrail();
            // 帧差分模式不需要AI模型，直接可用
            if (currentMode === 'diff') {
                setStatus('模式: 帧差分追踪 | 加载视频或启动摄像头后点击"提取轨迹"', 'green');
            } else {
                await loadModel();
                setStatus('模型就绪 | 加载视频或启动摄像头', 'green');
            }
        };
    </script>
</body>
</html>
