<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>保龄球轨迹分析系统</title>

    <!-- TensorFlow.js + COCO-SSD (本地离线版) -->
    <script src="libs/tensorflow/tf.min.js"></script>
    <script src="libs/tensorflow/coco-ssd.min.js"></script>

    <style>
        :root {
            --bg: #0d1117;
            --card-bg: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --text-dim: #8b949e;
            --accent: #f0883e;
            --accent2: #58a6ff;
            --green: #3fb950;
            --red: #f85149;
            --yellow: #d2991d;
            --lane-wood: #c8a45c;
            --lane-dark: #5a3e28;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
        }

        /* ===== 头部 ===== */
        .header {
            text-align: center;
            margin-bottom: 12px;
        }
        .header h1 {
            font-size: 2em;
            font-weight: 300;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 4px;
        }
        .header .subtitle {
            font-size: 13px;
            color: var(--text-dim);
        }

        /* ===== 主布局 ===== */
        .main-layout {
            display: flex;
            justify-content: center;
            gap: 10px;
            max-width: 100%;
            width: 100%;
            padding: 0 8px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 10px;
            border: 1px solid var(--border);
            box-shadow: 0 6px 20px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        .card h3 {
            text-align: center;
            font-weight: 300;
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        /* ===== 视频区 ===== */
        .video-panel {
            flex: 0 0 78%;
            max-width: 78%;
            min-width: 0;
            transition: flex 0.3s, max-width 0.3s, opacity 0.3s;
        }
        .video-panel.hidden {
            flex: 0 0 0;
            max-width: 0;
            padding: 0;
            border: none;
            opacity: 0;
            overflow: hidden;
        }
        .video-wrapper {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }
        .video-wrapper video {
            display: block;
            width: 100%;
            height: auto;
            transition: transform 0.3s;
        }
        .video-wrapper video.mirrored {
            transform: rotateY(180deg);
            -webkit-transform: rotateY(180deg);
        }
        .video-wrapper canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* ===== 轨迹面板 ===== */
        .trail-panel {
            flex: 0 0 20%;
            max-width: 20%;
            min-width: 140px;
            transition: flex 0.3s, max-width 0.3s, opacity 0.3s;
        }
        .trail-panel.hidden {
            flex: 0 0 0;
            max-width: 0;
            padding: 0;
            border: none;
            opacity: 0;
            overflow: hidden;
        }
        .trail-panel.maximized {
            flex: 0 0 100%;
            max-width: 100%;
        }
        .trail-panel.maximized canvas {
            width: 100%;
            max-width: 500px;
            height: auto;
        }
        .trail-panel canvas {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 6px;
            background: #0a0a0f;
            cursor: crosshair;
        }

        /* ===== 工具栏 ===== */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 8px 0;
            max-width: 100%;
            width: 100%;
        }
        .toolbar label {
            font-size: 13px;
            color: var(--text-dim);
        }
        .toolbar select, .toolbar button {
            padding: 7px 16px;
            border-radius: 6px;
            background: #21262d;
            color: var(--text);
            border: 1px solid var(--border);
            font-size: 13px;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }
        .toolbar select:focus, .toolbar button:hover {
            border-color: var(--accent);
        }
        .toolbar button {
            font-weight: 500;
        }
        .toolbar button.primary {
            background: #238636;
            border-color: #2ea043;
            color: #fff;
        }
        .toolbar button.primary:hover { background: #2ea043; }
        .toolbar button.danger {
            background: #da3633;
            border-color: #f85149;
            color: #fff;
        }
        .toolbar button.danger:hover { background: #f85149; }
        .toolbar button.accent {
            background: #9a6700;
            border-color: #d2991d;
            color: #fff;
        }
        .toolbar .status-badge {
            padding: 7px 16px;
            background: #21262d;
            border-radius: 20px;
            font-size: 13px;
            border-left: 4px solid var(--green);
            color: var(--green);
            min-width: 140px;
            text-align: center;
        }

        /* ===== 数据面板 ===== */
        .data-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            max-width: 100%;
            width: 100%;
            margin-top: 4px;
        }
        .metric-card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 12px 20px;
            border: 1px solid var(--border);
            text-align: center;
            min-width: 100px;
            flex: 1 1 100px;
        }
        .metric-card .label {
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .metric-card .value {
            font-size: 20px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }
        .metric-card .value.speed { color: var(--accent2); }
        .metric-card .value.pos { color: var(--accent); }
        .metric-card .value.rpm { color: var(--yellow); }
        .metric-card .value.time { color: var(--green); }
        .metric-card .unit {
            font-size: 10px;
            color: var(--text-dim);
        }

        /* ===== 检测参数面板 ===== */
        .params-panel {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 8px 12px;
            border: 1px solid var(--border);
            max-width: 100%;
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }
        .params-panel .param-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .params-panel label {
            color: var(--text-dim);
            white-space: nowrap;
        }
        .params-panel input[type="range"] {
            width: 100px;
            accent-color: var(--accent);
        }
        .params-panel input[type="color"] {
            width: 28px;
            height: 24px;
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            background: transparent;
            padding: 1px;
        }
        .params-panel span.val {
            color: var(--accent);
            min-width: 28px;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        /* ===== 页脚 ===== */
        .footer {
            margin-top: 14px;
            font-size: 12px;
            color: #484f58;
            text-align: center;
        }
        .footer kbd {
            background: #21262d;
            padding: 2px 8px;
            border-radius: 4px;
            color: var(--text);
            border: 1px solid var(--border);
        }

        /* ===== 响应式 ===== */
        @media (max-width: 850px) {
            .main-layout {
                flex-wrap: wrap;
            }
            .video-panel {
                flex: 0 0 100%;
                max-width: 100%;
            }
            .trail-panel {
                flex: 0 0 100%;
                max-width: 100%;
                min-width: 0;
            }
            .trail-panel canvas {
                width: 100%;
                height: auto;
            }
            .toolbar {
                gap: 6px;
                flex-wrap: wrap;
                font-size: 11px;
            }
            .toolbar select, .toolbar button {
                padding: 5px 10px;
                font-size: 11px;
            }
            .params-panel {
                gap: 8px;
            }
            .header h1 { font-size: 1.4em; }
        }
    </style>
</head>
<body>

    <!-- 头部 -->
    <div class="header">
        <h1>保龄球轨迹分析系统</h1>
        <p class="subtitle">实时追踪保龄球运动轨迹 · 速度分析 · 拐点检测</p>
    </div>

    <!-- 主布局 -->
    <div class="main-layout">
        <!-- 左：摄像头 -->
        <div class="card video-panel" id="videoPanel">
            <h3>摄像头画面 <span id="camLabel" style="font-size:11px;color:var(--text-dim);"></span></h3>
            <div class="video-wrapper">
                <video id="webcam" playsinline></video>
                <canvas id="detectOverlay"></canvas>
            </div>
        </div>

        <!-- 右：轨迹画布 -->
        <div class="card trail-panel" id="trailPanel">
            <h3>运动轨迹 (俯视图) <button id="rotateTrailBtn" class="accent" style="font-size:11px;padding:2px 8px;margin-left:8px;">旋转视角</button><span id="rotateAngle" style="color:var(--text-dim);font-size:11px;margin-left:6px;"></span></h3>
            <canvas id="trailCanvas" width="200" height="600"></canvas>
        </div>
    </div>

    <!-- 工具栏 -->
    <div class="toolbar">
        <label for="modeSelect">检测模式:</label>
        <select id="modeSelect">
            <option value="diff">帧差分追踪</option>
            <option value="ai">AI 检测 (COCO-SSD)</option>
            <option value="ai_color">AI + 颜色过滤</option>
            <option value="color">颜色分割</option>
        </select>

        <label for="laneSelect">球道识别:</label>
        <select id="laneSelect">
            <option value="none">无</option>
            <option value="manual" selected>手动标定</option>
        </select>
        <button id="skipCalibBtn" class="accent" style="font-size:11px;padding:3px 10px;">跳过标定</button>

        <button id="loadVideoBtn" class="accent">加载视频</button>
        <input type="file" id="videoFileInput" accept="video/*" style="display:none;">
        <button id="captureBgBtn" class="primary" style="font-size:12px;padding:5px 12px;">捕获背景 ⚠</button>
        <button id="cameraBtn" class="accent">启动摄像头</button>
        <button id="switchCameraBtn" class="accent" style="display:none;">切换摄像头</button>
        <button id="readyBtn" class="accent">准备</button>
        <button id="startBtn" class="primary" style="display:none;">开始</button>
        <button id="pauseBtn" class="accent" style="display:none;">暂停</button>
        <button id="stopBtn" class="danger" style="display:none;">结束</button>
        <button id="playbackBtn" class="accent">轨迹回放</button>
        <button id="resetBtn" class="danger">重置 (R)</button>

        <div class="status-badge" id="statusBadge">等待启动...</div>
        
        <span style="color:var(--text-dim);font-size:11px;">|</span>
        <button id="toggleVideoBtn" class="accent" style="font-size:11px;padding:4px 10px;" title="显示/隐藏摄像头面板">📷 隐藏</button>
        <button id="toggleTrailBtn" class="accent" style="font-size:11px;padding:4px 10px;" title="显示/隐藏轨迹面板">📊 隐藏</button>
        <button id="maximizeTrailBtn" class="accent" style="font-size:11px;padding:4px 10px;" title="轨迹面板最大化">⬜ 最大化</button>
    </div>

    <!-- 拍摄角度提示 -->
    <div class="params-panel" id="cameraGuide" style="justify-content:flex-start;gap:8px;">
        <span style="color:#d2991d;font-weight:bold;">使用步骤:</span>
        <span style="color:var(--text);font-weight:bold;">1. 加载视频 → 2. 空球道时点</span>
        <span style="color:var(--green);font-weight:bold;">"捕获背景"</span>
        <span style="color:var(--text);font-weight:bold;">→ 3. 点"准备" → 4. 球出手后点"开始"记录轨迹</span>
    </div>

    <!-- 检测参数 -->
    <div class="params-panel" id="paramsPanel">
        <div class="param-group">
            <label>球道容差:</label>
            <input type="range" id="laneColorDev" min="20" max="150" value="60">
            <span class="val" id="laneDevVal">60</span>
            <span style="color:var(--text-dim);font-size:10px;">越低越严格</span>
        </div>
        <div class="param-group">
            <label>平滑系数:</label>
            <input type="range" id="smoothFactor" min="0.1" max="0.9" step="0.05" value="0.65">
            <span class="val" id="smoothVal">0.65</span>
        </div>
        <div class="param-group">
            <label>最小置信度:</label>
            <input type="range" id="minConfidence" min="0.1" max="0.9" step="0.05" value="0.35">
            <span class="val" id="confVal">0.35</span>
        </div>
        <div class="param-group">
            <label>轨迹保留:</label>
            <input type="range" id="maxPoints" min="30" max="300" step="10" value="150">
            <span class="val" id="pointsVal">150</span>
        </div>
    </div>

    <!-- 数据面板 -->
    <div class="data-panel">
        <div class="metric-card">
            <div class="label">当前速度</div>
            <div class="value speed" id="currentSpeed">--</div>
            <div class="unit">mph</div>
        </div>
        <div class="metric-card">
            <div class="label">犯规线速度</div>
            <div class="value speed" id="foulSpeed">--</div>
            <div class="unit">mph</div>
        </div>
        <div class="metric-card">
            <div class="label">球位置 X</div>
            <div class="value pos" id="ballX">--</div>
            <div class="unit">board</div>
        </div>
        <div class="metric-card">
            <div class="label">球位置 Y</div>
            <div class="value pos" id="ballY">--</div>
            <div class="unit">ft</div>
        </div>
        <div class="metric-card">
            <div class="label">转速</div>
            <div class="value rpm" id="ballRPM">--</div>
            <div class="unit">RPM</div>
        </div>
        <div class="metric-card">
            <div class="label">已运行时间</div>
            <div class="value time" id="elapsedTime">0.00</div>
            <div class="unit">秒</div>
        </div>
        <div class="metric-card">
            <div class="label">拐点距离</div>
            <div class="value pos" id="breakPoint">--</div>
            <div class="unit">ft</div>
        </div>
        <div class="metric-card">
            <div class="label">入射角</div>
            <div class="value pos" id="entryAngle">--</div>
            <div class="unit">°</div>
        </div>
    </div>

    <div class="footer">
        按 <kbd>R</kbd> 重置轨迹 | 按 <kbd>Space</kbd> 准备/开始/暂停/继续 | 按 <kbd>P</kbd> 轨迹回放
    </div>

    <script>
        // ==================== DOM 元素 ====================
        const video = document.getElementById('webcam');
        const detectOverlay = document.getElementById('detectOverlay');
        const detectCtx = detectOverlay.getContext('2d');
        const trailCanvas = document.getElementById('trailCanvas');
        const trailCtx = trailCanvas.getContext('2d');
        const statusBadge = document.getElementById('statusBadge');
        const modeSelect = document.getElementById('modeSelect');
        const laneSelect = document.getElementById('laneSelect');

        // 参数元素
        const laneColorDevInput = document.getElementById('laneColorDev');
        const smoothFactorInput = document.getElementById('smoothFactor');
        const minConfidenceInput = document.getElementById('minConfidence');
        const maxPointsInput = document.getElementById('maxPoints');

        // 数据元素
        const currentSpeedEl = document.getElementById('currentSpeed');
        const foulSpeedEl = document.getElementById('foulSpeed');
        const ballXEl = document.getElementById('ballX');
        const ballYEl = document.getElementById('ballY');
        const ballRPMEl = document.getElementById('ballRPM');
        const elapsedTimeEl = document.getElementById('elapsedTime');
        const breakPointEl = document.getElementById('breakPoint');
        const entryAngleEl = document.getElementById('entryAngle');

        // ==================== 状态变量 ====================
        let trailPoints = [];        // 轨迹点: {x, y, t, rawX, rawY}
        let currentMode = 'diff';
        let cocoDetector = null;
        let camera = null;
        let isTracking = false;
        let trackingStartTime = 0;
        let lastDetectionTime = 0;
        let lastPosition = null;     // EWA 平滑后的位置
        let rawPosition = null;      // 原始检测位置
        let ballMissCount = 0;
        let foulLineSpeed = 0;       // 犯规线速度
        let breakPointDist = 0;      // 拐点距离
        let entryAngle = 0;          // 入射角

        // 球道容差
        let targetColor = '#ff8800'; // 保留兼容
        let colorTolerance = 50;     // 保留兼容
        let smoothFactor = 0.65;
        let minConfidence = 0.35;
        let maxPoints = 150;

        // 视频文件模式
        let isVideoFileMode = false;
        let videoFileURL = null;

        // 回放
        let isPlaybackMode = false;
        let playbackIndex = 0;
        let playbackTimer = null;
        let savedTrail = [];

        // ===== 帧差分追踪状态 =====
        let prevFrameGray = null;    // 上一帧灰度图数据
        let diffCanvas = null;       // 离屏canvas用于帧差分
        let diffCtx = null;
        let prevBallPos = null;      // 上一帧球位置 (用于连续性)
        let allTrajectories = [];    // 所有候选轨迹

        // ===== 摄像头切换 =====
        let currentFacingMode = 'user'; // 'user' 或 'environment'

        // ===== 转速计算 =====
        let prevBallROI = null;       // 上一帧球区域灰度图
        let prevBallCenter = null;    // 上一帧球中心
        let ballRPM = 0;              // 当前转速
        let rpmWindow = [];           // 转速滑动窗口
        const RPM_ROI_SIZE = 40;      // 转速分析区域大小

        // 球道标定 (手动四个角点归一化坐标)
        let laneCorners = null; // [{x,y}, {x,y}, {x,y}, {x,y}] 左上、右上、右下、左下
        let homographyMatrix = null; // 3x3 透视变换矩阵

        // ========== Homography 透视变换 ==========
        // 用DLT算法从4对点计算3x3单应性矩阵
        function computeHomography(srcPts, dstPts) {
            // srcPts: 摄像头画面中的4个角点 [{x,y},...]
            // dstPts: 目标俯视图中的4个角点 [{x,y},...]
            // 构建线性方程组 Ah = 0, 用SVD求解
            const A = [];
            for (let i = 0; i < 4; i++) {
                const sx = srcPts[i].x, sy = srcPts[i].y;
                const dx = dstPts[i].x, dy = dstPts[i].y;
                A.push([sx, sy, 1, 0, 0, 0, -dx * sx, -dx * sy, -dx]);
                A.push([0, 0, 0, sx, sy, 1, -dy * sx, -dy * sy, -dy]);
            }

            // 简化的特征向量求解 (幂迭代 + deflation, 对于8x9矩阵取最小特征值对应的向量)
            // 构造 A^T * A (9x9)
            const ATA = Array.from({ length: 9 }, () => new Float64Array(9));
            for (let i = 0; i < 8; i++) {
                for (let j = 0; j < 9; j++) {
                    for (let k = 0; k < 9; k++) {
                        ATA[j][k] += A[i][j] * A[i][k];
                    }
                }
            }

            // 幂迭代求最大特征值对应的特征向量, 然后用ATA的逆来求最小特征值
            // 改用更简单的方法: 高斯消元 + 回代 (设h33=1)
            // 取前8个方程, 8个未知数(h11-h32)
            const M = Array.from({ length: 8 }, () => new Float64Array(9));
            for (let i = 0; i < 8; i++) {
                for (let j = 0; j < 8; j++) {
                    M[i][j] = A[i][j];
                }
                M[i][8] = -A[i][8]; // 将 h33 项移到右边 (设h33=1)
            }

            // 高斯消元
            for (let col = 0; col < 8; col++) {
                // 找主元
                let maxRow = col;
                let maxVal = Math.abs(M[col][col]);
                for (let row = col + 1; row < 8; row++) {
                    const val = Math.abs(M[row][col]);
                    if (val > maxVal) { maxVal = val; maxRow = row; }
                }
                // 交换行
                if (maxRow !== col) {
                    const temp = M[col]; M[col] = M[maxRow]; M[maxRow] = temp;
                }
                // 消元
                const pivot = M[col][col];
                if (Math.abs(pivot) < 1e-10) continue;
                for (let row = col + 1; row < 8; row++) {
                    const factor = M[row][col] / pivot;
                    for (let j = col; j < 9; j++) {
                        M[row][j] -= factor * M[col][j];
                    }
                }
            }

            // 回代
            const h = new Float64Array(9);
            h[8] = 1; // h33
            for (let row = 7; row >= 0; row--) {
                let sum = 0;
                for (let j = row + 1; j < 8; j++) {
                    sum += M[row][j] * h[j];
                }
                h[row] = (M[row][8] - sum) / M[row][row];
            }

            // 构建3x3矩阵
            return [
                [h[0], h[1], h[2]],
                [h[3], h[4], h[5]],
                [h[6], h[7], h[8]]
            ];
        }

        // 应用单应性矩阵变换坐标
        function applyHomography(H, x, y) {
            const w = H[2][0] * x + H[2][1] * y + H[2][2];
            if (Math.abs(w) < 1e-10) return null;
            const nx = (H[0][0] * x + H[0][1] * y + H[0][2]) / w;
            const ny = (H[1][0] * x + H[1][1] * y + H[1][2]) / w;
            return { x: nx, y: ny };
        }

        // 构建默认目标俯视图坐标 (球瓶区在顶部y=0, 犯规线在底部y=1)
        function getDefaultDstCorners() {
            return [
                { x: 0, y: 0 },     // 左上 -> 球瓶区左
                { x: 1, y: 0 },     // 右上 -> 球瓶区右
                { x: 1, y: 1 },     // 右下 -> 犯规线右
                { x: 0, y: 1 }      // 左下 -> 犯规线左
            ];
        }

        // 更新单应性矩阵
        function updateHomography() {
            if (laneCorners && laneCorners.length === 4) {
                homographyMatrix = computeHomography(laneCorners, getDefaultDstCorners());
            } else {
                homographyMatrix = null;
            }
        }

        // ===== 轨迹旋转 =====
        let trailRotation = 0;       // 当前旋转角度 (度)
        let isRotating = false;      // 是否正在旋转模式
        let rotateStartX = 0;
        let rotateStartAngle = 0;

        // 球道参考线 (归一化坐标, 用于绘制)
        // 球瓶区固定在顶部 (画面y=0附近), 犯规线在底部 (画面y=1附近)
        // ballDirection: +1 = 球向画面底部移动, -1 = 球向画面顶部移动
        const PIN_DECK_Y = 0.08;     // 球瓶区 (画布顶部)
        const ARROWS_Y = 0.65;       // 箭头标记
        const FOUL_LINE_Y = 0.90;    // 犯规线 (画布底部)
        let ballDirection = 0;       // 自动检测: +1向下, -1向上, 0未检测

        // ==================== 球运动方向检测 ====================
        function detectBallDirection() {
            if (trailPoints.length < 8) return;
            const ys = trailPoints.slice(-8).map(p => p.y);
            const dy = ys[ys.length - 1] - ys[0];
            if (Math.abs(dy) > 0.02) {
                ballDirection = dy > 0 ? 1 : -1;
            }
        }

        // ==================== 工具函数 ====================
        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1,3), 16);
            const g = parseInt(hex.slice(3,5), 16);
            const b = parseInt(hex.slice(5,7), 16);
            return { r, g, b };
        }

        function colorDistance(r1, g1, b1, r2, g2, b2) {
            return Math.sqrt(
                (r1 - r2) ** 2 + (g1 - g2) ** 2 + (b1 - b2) ** 2
            );
        }

        function clamp(v, min, max) {
            return Math.min(max, Math.max(min, v));
        }

        // EWA 指数加权平均平滑
        function ewaSmooth(current, previous, factor) {
            if (!previous) return current;
            return {
                x: previous.x + factor * (current.x - previous.x),
                y: previous.y + factor * (current.y - previous.y)
            };
        }

        // ==================== 轨迹管理 ====================
        // 判断点是否在球道四边形内 (用于检测过滤)
        function isInsideLane(px, py) {
            if (!laneCorners || laneCorners.length !== 4) return true; // 未标定时不过滤
            // 射线法判断点是否在多边形内
            const poly = laneCorners.map(c => ({ x: c.x * video.videoWidth, y: c.y * video.videoHeight }));
            let inside = false;
            for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
                const xi = poly[i].x, yi = poly[i].y;
                const xj = poly[j].x, yj = poly[j].y;
                if ((yi > py) !== (yj > py) && px < (xj - xi) * (py - yi) / (yj - yi) + xi) {
                    inside = !inside;
                }
            }
            return inside;
        }

        function addTrailPoint(rawX, rawY, timestamp) {
            if (!isTracking && !isPlaybackMode) return;

            const now = timestamp || performance.now();

            // 如果已标定球道,检查点是否在球道范围内
            if (laneCorners && laneCorners.length === 4 && !isInsideLane(rawX, rawY)) {
                return; // 过滤球道外的噪点
            }

            let nx, ny;
            if (homographyMatrix) {
                // 使用透视变换: 将摄像头像素坐标映射到俯视图归一化坐标 (0~1)
                const hx = rawX / video.videoWidth;
                const hy = rawY / video.videoHeight;
                const transformed = applyHomography(homographyMatrix, hx, hy);
                if (!transformed) return;
                // 限制在有效范围
                nx = clamp(transformed.x, -0.2, 1.2);
                ny = clamp(transformed.y, -0.2, 1.2);
            } else {
                // 未标定: 简单归一化 (透视失真严重)
                nx = clamp(rawX / video.videoWidth, 0, 1);
                ny = clamp(rawY / video.videoHeight, 0, 1);
            }

            // 归一化坐标
            const point = {
                rawX: rawX,
                rawY: rawY,
                x: nx,
                y: ny,
                t: now
            };

            trailPoints.push(point);
            if (trailPoints.length > maxPoints) {
                trailPoints.shift();
            }

            // 更新 EWA 平滑
            lastPosition = ewaSmooth(point, lastPosition, smoothFactor);

            // 检测球的运动方向
            detectBallDirection();

            // 更新速度
            updateSpeed();
            // 更新拐点
            updateBreakPoint();
            // 更新入射角
            updateEntryAngle();

            drawTrail();
            updateDataPanel();
        }

        function resetTrail() {
            trailPoints = [];
            lastPosition = null;
            rawPosition = null;
            lastDetectionTime = 0;
            trackingStartTime = 0;
            foulLineSpeed = 0;
            breakPointDist = 0;
            entryAngle = 0;
            ballMissCount = 0;
            ballDirection = 0;
            prevFrameGray = null;
            prevBallPos = null;
            cachedLaneMask = null;
            prevBallROI = null;
            prevBallCenter = null;
            backgroundGray = null;
            backgroundRGB = null;
            bgCaptured = false;
            ballRPM = 0;
            rpmWindow = [];
            stopPlayback();
            // 重置按钮状态
            setTrackState('idle');
            // 保留 laneCorners 和 homographyMatrix (摄像头/球道不变)
            // 保留背景帧 (场景不变)
            drawTrail();
            updateDataPanel();
            const calibMsg = homographyMatrix ? ' | 透视校正已启用' : '';
            const bgMsg = bgCaptured ? ' | 背景减除' : '';
            setStatus('轨迹已重置' + calibMsg + bgMsg, 'green');
        }

        // ===== 追踪状态机 =====
        // IDLE → 点"准备" → READY(启动检测循环但不记录) → 点"开始" → TRACKING → 点"暂停" → PAUSED → 点"继续" → TRACKING → 点"结束" → IDLE
        let trackState = 'idle';  // 'idle' | 'ready' | 'tracking' | 'paused'

        function updateTrackButtons() {
            const readyBtn = document.getElementById('readyBtn');
            const startBtn = document.getElementById('startBtn');
            const pauseBtn = document.getElementById('pauseBtn');
            const stopBtn = document.getElementById('stopBtn');

            switch (trackState) {
                case 'idle':
                    readyBtn.style.display = 'inline-block';
                    startBtn.style.display = 'none';
                    startBtn.textContent = '开始';
                    pauseBtn.style.display = 'none';
                    stopBtn.style.display = 'none';
                    break;
                case 'ready':
                    readyBtn.style.display = 'none';
                    startBtn.style.display = 'inline-block';
                    startBtn.textContent = '开始';
                    pauseBtn.style.display = 'none';
                    stopBtn.style.display = 'none';
                    break;
                case 'tracking':
                    readyBtn.style.display = 'none';
                    startBtn.style.display = 'none';
                    pauseBtn.style.display = 'inline-block';
                    stopBtn.style.display = 'inline-block';
                    break;
                case 'paused':
                    readyBtn.style.display = 'none';
                    startBtn.style.display = 'inline-block';
                    startBtn.textContent = '继续';
                    pauseBtn.style.display = 'none';
                    stopBtn.style.display = 'inline-block';
                    break;
            }
        }

        function setTrackState(newState) {
            trackState = newState;
            updateTrackButtons();
        }

        function readyTracking() {
            setTrackState('ready');
            // 启动检测循环但不记录轨迹
            startDetectionLoop();
            setStatus('准备就绪 — 按"开始"记录轨迹', 'yellow');
        }

        function startTracking() {
            isTracking = true;
            trackingStartTime = performance.now();
            setTrackState('tracking');
            setStatus('追踪中...', 'green');
        }

        function pauseTracking() {
            isTracking = false;
            setTrackState('paused');
            setStatus('追踪已暂停', 'yellow');
        }

        function finishTracking() {
            isTracking = false;
            setTrackState('idle');
            if (isVideoFileMode) {
                video.pause();
                video.currentTime = 0;
            }
            setStatus('追踪已结束 (' + trailPoints.length + ' 个轨迹点)', 'red');
        }

        // ==================== 速度计算 ====================
        function updateSpeed() {
            if (trailPoints.length < 2) return;

            const len = trailPoints.length;
            const p1 = trailPoints[Math.max(0, len - 10)];
            const p2 = trailPoints[len - 1];
            const dt = (p2.t - p1.t) / 1000; // 秒

            if (dt < 0.01) return;

            // 像素距离
            const dx = p2.rawX - p1.rawX;
            const dy = p2.rawY - p1.rawY;
            const pixelDist = Math.sqrt(dx * dx + dy * dy);

            // 像素到英尺的近似转换 (基于球道标准尺寸)
            // 球道宽 42英寸 = 3.5英尺, 假设视频中球道约占画面宽度
            const pixelPerFt = video.videoWidth / 4; // 粗略估计
            const distFt = pixelDist / pixelPerFt;
            const speedFps = distFt / dt;
            const speedMph = speedFps * 0.681818; // ft/s to mph

            // 更新犯规线速度
            // 有透视校正时: 球道俯视图, 球从犯规线(底部y≈0.90)向球瓶区(顶部y≈0.08)移动
            // 无透视校正时: 根据ballDirection自适应判断
            if (homographyMatrix) {
                if (p2.y <= FOUL_LINE_Y && p1.y > FOUL_LINE_Y) {
                    foulLineSpeed = speedMph;
                }
            } else {
                const foulY = ballDirection < 0 ? (1 - FOUL_LINE_Y) : FOUL_LINE_Y;
                if (ballDirection < 0) {
                    if (p2.y > foulY && p1.y <= foulY) {
                        foulLineSpeed = speedMph;
                    }
                } else {
                    if (p2.y < foulY && p1.y >= foulY) {
                        foulLineSpeed = speedMph;
                    }
                }
            }
        }

        function updateBreakPoint() {
            if (trailPoints.length < 5) return;
            // 拐点：轨迹中 X 方向变化率最大的点
            let maxChange = 0;
            for (let i = 2; i < trailPoints.length - 2; i++) {
                const dx1 = trailPoints[i].x - trailPoints[i-2].x;
                const dx2 = trailPoints[i+2].x - trailPoints[i].x;
                const change = Math.abs(dx2 - dx1);
                if (change > maxChange) {
                    maxChange = change;
                    breakPointDist = trailPoints[i].y * 60; // 归一化到英尺
                }
            }
        }

        function updateEntryAngle() {
            if (trailPoints.length < 5) return;
            const len = trailPoints.length;
            const recent = trailPoints.slice(Math.max(0, len - 5));
            if (recent.length < 2) return;
            const dx = recent[recent.length-1].x - recent[0].x;
            const dy = recent[recent.length-1].y - recent[0].y;
            // 方向角度 (相对于前进方向)
            entryAngle = (Math.atan2(dx, dy) * 180 / Math.PI).toFixed(1);
        }

        // ==================== 绘制轨迹 ====================
        function drawTrail() {
            const w = trailCanvas.width, h = trailCanvas.height;
            trailCtx.save();
            trailCtx.clearRect(0, 0, w, h);

            // 应用旋转
            if (trailRotation !== 0) {
                trailCtx.translate(w / 2, h / 2);
                trailCtx.rotate(trailRotation * Math.PI / 180);
                trailCtx.translate(-w / 2, -h / 2);
            }

            // 绘制球道背景
            drawLaneOnTrail(w, h);

            // 标定模式: 绘制已点击的标定点
            if (calibrating && calibrationPoints.length > 0) {
                for (let i = 0; i < calibrationPoints.length; i++) {
                    const cp = calibrationPoints[i];
                    const cpx = cp.x * w, cpy = cp.y * h;
                    trailCtx.fillStyle = '#00ff00';
                    trailCtx.beginPath();
                    trailCtx.arc(cpx, cpy, 8, 0, 2 * Math.PI);
                    trailCtx.fill();
                    trailCtx.strokeStyle = '#fff';
                    trailCtx.lineWidth = 2;
                    trailCtx.stroke();
                    trailCtx.fillStyle = '#fff';
                    trailCtx.font = 'bold 12px sans-serif';
                    trailCtx.fillText(i + 1, cpx + 12, cpy - 8);
                }
                // 连线
                if (calibrationPoints.length >= 2) {
                    trailCtx.strokeStyle = 'rgba(0, 255, 0, 0.5)';
                    trailCtx.lineWidth = 2;
                    trailCtx.setLineDash([4, 4]);
                    trailCtx.beginPath();
                    trailCtx.moveTo(calibrationPoints[0].x * w, calibrationPoints[0].y * h);
                    for (let i = 1; i < calibrationPoints.length; i++) {
                        trailCtx.lineTo(calibrationPoints[i].x * w, calibrationPoints[i].y * h);
                    }
                    trailCtx.stroke();
                    trailCtx.setLineDash([]);
                }
            }

            // 标定完成后: 绘制球道透视边框 (绿色虚线)
            if (homographyMatrix && laneCorners && !calibrating) {
                trailCtx.strokeStyle = 'rgba(63, 185, 80, 0.4)';
                trailCtx.lineWidth = 1;
                trailCtx.setLineDash([3, 5]);
                trailCtx.beginPath();
                trailCtx.moveTo(laneCorners[0].x * w, laneCorners[0].y * h);
                for (let i = 1; i < 4; i++) {
                    trailCtx.lineTo(laneCorners[i].x * w, laneCorners[i].y * h);
                }
                trailCtx.closePath();
                trailCtx.stroke();
                trailCtx.setLineDash([]);
            }

            if (trailPoints.length < 2) {
                trailCtx.fillStyle = '#444';
                trailCtx.font = '15px sans-serif';
                trailCtx.textAlign = 'center';
                if (calibrating) {
                    trailCtx.fillStyle = '#d2991d';
                    trailCtx.font = 'bold 14px sans-serif';
                    trailCtx.fillText('请点击球道的4个角点', w/2, h/2 - 30);
                    trailCtx.fillText('顺序: 球瓶区左上 → 球瓶区右上 → 犯规线右下 → 犯规线左下', w/2, h/2);
                    trailCtx.fillStyle = '#888';
                    trailCtx.font = '12px sans-serif';
                    trailCtx.fillText('(标定后可消除透视失真)', w/2, h/2 + 25);
                } else if (homographyMatrix) {
                    trailCtx.fillStyle = '#3fb950';
                    trailCtx.font = '13px sans-serif';
                    trailCtx.fillText('球道已标定, 等待追踪数据...', w/2, h/2);
                } else {
                    trailCtx.fillText('等待追踪数据...', w/2, h/2);
                }
                return;
            }

            // 连线 (俯视图: 球瓶区=顶部, 犯规线=底部)
            for (let i = 1; i < trailPoints.length; i++) {
                const p1 = trailPoints[i-1], p2 = trailPoints[i];
                const alpha = 0.15 + 0.85 * (i / trailPoints.length);
                trailCtx.beginPath();
                trailCtx.moveTo(p1.x * w, p1.y * h);
                trailCtx.lineTo(p2.x * w, p2.y * h);
                trailCtx.strokeStyle = `rgba(240, 136, 62, ${alpha})`;
                trailCtx.lineWidth = 3;
                trailCtx.lineCap = 'round';
                trailCtx.stroke();
            }

            // 点
            for (let i = 0; i < trailPoints.length; i++) {
                const p = trailPoints[i];
                const px = p.x * w, py = p.y * h;
                const radius = 2 + 5 * (i / trailPoints.length);
                const alpha = 0.3 + 0.7 * (i / trailPoints.length);
                const gradient = trailCtx.createRadialGradient(
                    px - radius/2, py - radius/2, 0,
                    px, py, radius
                );
                gradient.addColorStop(0, `rgba(255, 180, 80, ${alpha})`);
                gradient.addColorStop(1, `rgba(240, 100, 30, ${alpha * 0.7})`);
                trailCtx.beginPath();
                trailCtx.arc(px, py, radius, 0, 2 * Math.PI);
                trailCtx.fillStyle = gradient;
                trailCtx.shadowColor = `rgba(240, 136, 62, ${alpha * 0.3})`;
                trailCtx.shadowBlur = 10;
                trailCtx.fill();
                trailCtx.shadowBlur = 0;
            }

            // 最新点高亮
            const last = trailPoints[trailPoints.length - 1];
            const lx = last.x * w, ly = last.y * h;
            trailCtx.beginPath();
            trailCtx.arc(lx, ly, 9, 0, 2 * Math.PI);
            trailCtx.fillStyle = '#fff';
            trailCtx.fill();
            trailCtx.beginPath();
            trailCtx.arc(lx, ly, 6, 0, 2 * Math.PI);
            trailCtx.fillStyle = '#f0883e';
            trailCtx.fill();

            // 拐点标记
            if (breakPointDist > 0) {
                const bpY = breakPointDist / 60 * h;
                trailCtx.beginPath();
                trailCtx.arc(w / 2, bpY, 6, 0, 2 * Math.PI);
                trailCtx.fillStyle = '#d2991d';
                trailCtx.strokeStyle = '#fff';
                trailCtx.lineWidth = 2;
                trailCtx.fill();
                trailCtx.stroke();
                trailCtx.fillStyle = '#d2991d';
                trailCtx.font = '11px monospace';
                trailCtx.textAlign = 'left';
                trailCtx.fillText(`拐点 ${breakPointDist.toFixed(0)}ft`, w / 2 + 12, bpY + 4);
            }

            trailCtx.fillStyle = '#666';
            trailCtx.font = '12px monospace';
            trailCtx.textAlign = 'right';
            const calibStatus = homographyMatrix ? ' | 透视校正' : ' | 未校正';
            trailCtx.fillText(`点数: ${trailPoints.length}${calibStatus}`, w - 10, 20);

            trailCtx.restore();
        }

        // 绘制球道参考线 (带距离刻度 + 方向箭头)
        function drawLaneOnTrail(w, h) {
            const foulY = FOUL_LINE_Y * h;
            const arrowY = ARROWS_Y * h;
            const pinY = PIN_DECK_Y * h;

            // 球道主体
            const laneLeft = w * 0.06;
            const laneRight = w * 0.94;
            trailCtx.fillStyle = 'rgba(139, 90, 43, 0.15)';
            trailCtx.fillRect(laneLeft, 0, laneRight - laneLeft, h);

            // 球沟
            trailCtx.fillStyle = 'rgba(50, 30, 15, 0.25)';
            trailCtx.fillRect(0, 0, laneLeft, h);
            trailCtx.fillRect(laneRight, 0, w - laneRight, h);

            // 中心线
            trailCtx.strokeStyle = 'rgba(255, 255, 255, 0.06)';
            trailCtx.lineWidth = 1;
            trailCtx.setLineDash([2, 8]);
            trailCtx.beginPath();
            trailCtx.moveTo(w / 2, 0);
            trailCtx.lineTo(w / 2, h);
            trailCtx.stroke();
            trailCtx.setLineDash([]);

            // 犯规线 (粗实线)
            trailCtx.strokeStyle = 'rgba(255, 80, 60, 0.7)';
            trailCtx.lineWidth = 2;
            trailCtx.setLineDash([]);
            trailCtx.beginPath();
            trailCtx.moveTo(laneLeft, foulY);
            trailCtx.lineTo(laneRight, foulY);
            trailCtx.stroke();
            // 标签
            trailCtx.fillStyle = '#f85149';
            trailCtx.font = 'bold 9px sans-serif';
            trailCtx.textAlign = 'right';
            trailCtx.fillText('犯规线', laneLeft - 3, foulY + 3);

            // 球瓶区 (点线)
            trailCtx.strokeStyle = 'rgba(255, 220, 80, 0.6)';
            trailCtx.lineWidth = 1.5;
            trailCtx.setLineDash([3, 5]);
            trailCtx.beginPath();
            trailCtx.moveTo(laneLeft, pinY);
            trailCtx.lineTo(laneRight, pinY);
            trailCtx.stroke();
            trailCtx.setLineDash([]);
            trailCtx.fillStyle = '#d2991d';
            trailCtx.textAlign = 'right';
            trailCtx.fillText('球瓶区', laneLeft - 3, pinY + 3);

            // 箭头标记
            trailCtx.strokeStyle = 'rgba(200, 200, 200, 0.3)';
            trailCtx.lineWidth = 1;
            trailCtx.setLineDash([4, 6]);
            trailCtx.beginPath();
            trailCtx.moveTo(laneLeft, arrowY);
            trailCtx.lineTo(laneRight, arrowY);
            trailCtx.stroke();
            trailCtx.setLineDash([]);
            trailCtx.fillStyle = 'rgba(200,200,200,0.5)';
            trailCtx.fillText('箭头', laneLeft - 3, arrowY + 3);

            // ===== 距离刻度尺 (右侧) =====
            // 0ft=犯规线(底部), 60ft=球瓶区(顶部)
            const tickX = laneRight + 2;
            const tickAreaTop = PIN_DECK_Y * h;
            const tickAreaBot = FOUL_LINE_Y * h;
            for (let ft = 0; ft <= 60; ft += 15) {
                const y = tickAreaBot + (tickAreaTop - tickAreaBot) * (ft / 60); // 0ft=底, 60ft=顶
                const tickLen = ft % 30 === 0 ? 10 : 5;
                trailCtx.strokeStyle = 'rgba(255,255,255,0.25)';
                trailCtx.lineWidth = 1;
                trailCtx.setLineDash([]);
                trailCtx.beginPath();
                trailCtx.moveTo(tickX, y);
                trailCtx.lineTo(tickX + tickLen, y);
                trailCtx.stroke();
                trailCtx.fillStyle = 'rgba(255,255,255,0.4)';
                trailCtx.font = '7px monospace';
                trailCtx.textAlign = 'left';
                trailCtx.fillText(`${ft}`, tickX + 12, y + 3);
            }

            // ===== 图例 (紧凑) =====
            const legendX = 2, legendY = 8;
            trailCtx.fillStyle = 'rgba(0,0,0,0.55)';
            trailCtx.fillRect(legendX, legendY, 90, 38);
            trailCtx.fillStyle = 'rgba(200,200,200,0.8)';
            trailCtx.font = '8px sans-serif';
            trailCtx.textAlign = 'left';
            trailCtx.fillText('60ft 球瓶区', legendX + 3, legendY + 10);
            trailCtx.fillText('0ft 犯规线', legendX + 3, legendY + 22);
            trailCtx.fillText('宽42in(39板)', legendX + 3, legendY + 34);
        }

        // ==================== 更新数据面板 ====================
        function updateDataPanel() {
            const len = trailPoints.length;

            if (len > 0) {
                const last = trailPoints[len - 1];
                // X 位置: 映射到板号 (1-39)
                const boardNum = Math.round(last.x * 38 + 1);
                ballXEl.textContent = clamp(boardNum, 1, 39);
                // Y 位置: 归一化到英尺
                const yFt = (last.y * 60).toFixed(1);
                ballYEl.textContent = yFt;
            } else {
                ballXEl.textContent = '--';
                ballYEl.textContent = '--';
            }

            // 速度
            if (len >= 2) {
                const p1 = trailPoints[Math.max(0, len - 10)];
                const p2 = trailPoints[len - 1];
                const dt = (p2.t - p1.t) / 1000;
                if (dt > 0.01) {
                    const dx = Math.abs(p2.rawX - p1.rawX);
                    const dy = Math.abs(p2.rawY - p1.rawY);
                    const pixelDist = Math.sqrt(dx * dx + dy * dy);
                    const pixelPerFt = video.videoWidth / 4;
                    const distFt = pixelDist / pixelPerFt;
                    const speedFps = distFt / dt;
                    const speedMph = (speedFps * 0.681818).toFixed(1);
                    currentSpeedEl.textContent = speedMph;
                }
            }

            foulSpeedEl.textContent = foulLineSpeed > 0 ? foulLineSpeed.toFixed(1) : '--';
            updateBallRPM();
            breakPointEl.textContent = breakPointDist > 0 ? breakPointDist.toFixed(0) : '--';
            entryAngleEl.textContent = entryAngle || '--';

            if (isTracking && trackingStartTime > 0) {
                const elapsed = ((performance.now() - trackingStartTime) / 1000).toFixed(2);
                elapsedTimeEl.textContent = elapsed;
            }
        }

        // ==================== 转速计算 ====================
        function extractBallROI(videoEl, result) {
            // 在球周围提取ROI用于转速分析
            if (!diffCanvas) {
                diffCanvas = document.createElement('canvas');
                diffCtx = diffCanvas.getContext('2d');
            }
            const size = RPM_ROI_SIZE;
            const x = Math.max(0, Math.floor(result.x - size / 2));
            const y = Math.max(0, Math.floor(result.y - size / 2));
            const w = Math.min(videoEl.videoWidth - x, size);
            const h = Math.min(videoEl.videoHeight - y, size);
            if (w < 10 || h < 10) return null;

            diffCanvas.width = w;
            diffCanvas.height = h;
            diffCtx.drawImage(videoEl, x, y, w, h, 0, 0, w, h);
            const imgData = diffCtx.getImageData(0, 0, w, h);
            const gray = new Float32Array(w * h);
            for (let i = 0; i < w * h; i++) {
                gray[i] = (imgData.data[i * 4] + imgData.data[i * 4 + 1] + imgData.data[i * 4 + 2]) / 3;
            }
            return { gray, w, h, cx: result.x - x, cy: result.y - y };
        }

        function computeCorrelation(roi1, roi2, angleOffset) {
            // 计算将roi2旋转angleOffset度后与roi1的相关性
            const { gray: g1, w, h, cx, cy } = roi1;
            const { gray: g2 } = roi2;
            const rad = angleOffset * Math.PI / 180;
            const cos = Math.cos(rad), sin = Math.sin(rad);
            let sum = 0, count = 0;
            const sampleStep = 3;

            for (let y = 0; y < h; y += sampleStep) {
                for (let x = 0; x < w; x += sampleStep) {
                    // 将roi2坐标绕中心旋转后采样
                    const rx = cx + (x - cx) * cos - (y - cy) * sin;
                    const ry = cy + (x - cx) * sin + (y - cy) * cos;
                    const ix = Math.round(rx), iy = Math.round(ry);
                    if (ix >= 0 && ix < w && iy >= 0 && iy < h) {
                        sum += Math.abs(g2[iy * w + ix] - g1[y * w + x]);
                        count++;
                    }
                }
            }
            return count > 0 ? sum / count : Infinity;
        }

        function updateBallRPM() {
            // 显示最近计算的转速
            if (rpmWindow.length > 0) {
                ballRPM = rpmWindow.reduce((a, b) => a + b, 0) / rpmWindow.length;
                ballRPMEl.textContent = ballRPM.toFixed(0);
            } else {
                ballRPMEl.textContent = ballRPM > 0 ? ballRPM.toFixed(0) : '--';
            }
        }

        function computeFrameRPM(result, videoEl) {
            // 帧间ROI相关找旋转角度
            if (!prevBallROI || !prevBallCenter) {
                prevBallROI = extractBallROI(videoEl, result);
                prevBallCenter = { x: result.x, y: result.y };
                return;
            }

            const currROI = extractBallROI(videoEl, result);
            if (!currROI) return;

            // 尝试不同旋转角度，找最佳匹配
            let bestAngle = 0, bestCost = Infinity;
            const maxAngle = 15; // 每帧最多旋转15度
            for (let a = -maxAngle; a <= maxAngle; a += 3) {
                const cost = computeCorrelation(prevBallROI, currROI, a);
                if (cost < bestCost) { bestCost = cost; bestAngle = a; }
            }

            // 转换为RPM (假设约30fps处理速率)
            const rpm = Math.abs(bestAngle) * 30 * 60 / 360;
            rpmWindow.push(rpm);
            if (rpmWindow.length > 8) rpmWindow.shift();
            ballRPM = rpmWindow.reduce((a, b) => a + b, 0) / rpmWindow.length;

            prevBallROI = currROI;
            prevBallCenter = { x: result.x, y: result.y };
        }

        // ==================== 状态显示 ====================
        function setStatus(text, color) {
            statusBadge.textContent = text;
            statusBadge.style.borderLeftColor = `var(--${color})`;
            statusBadge.style.color = `var(--${color})`;
        }

        // ==================== 颜色检测 ====================
        function detectByColor(videoEl) {
            const offCanvas = document.createElement('canvas');
            offCanvas.width = videoEl.videoWidth;
            offCanvas.height = videoEl.videoHeight;
            const offCtx = offCanvas.getContext('2d');
            offCtx.drawImage(videoEl, 0, 0);

            const imageData = offCtx.getImageData(0, 0, offCanvas.width, offCanvas.height);
            const pixels = imageData.data;
            const target = hexToRgb(targetColor);

            let sumX = 0, sumY = 0, count = 0;

            // 采样检测 (每隔4个像素)
            for (let y = 0; y < offCanvas.height; y += 4) {
                for (let x = 0; x < offCanvas.width; x += 4) {
                    const idx = (y * offCanvas.width + x) * 4;
                    const r = pixels[idx];
                    const g = pixels[idx + 1];
                    const b = pixels[idx + 2];

                    const dist = colorDistance(r, g, b, target.r, target.g, target.b);
                    if (dist < colorTolerance) {
                        sumX += x;
                        sumY += y;
                        count++;
                    }
                }
            }

            if (count > 30) {
                return {
                    x: sumX / count,
                    y: sumY / count,
                    confidence: Math.min(1, count / 500)
                };
            }
            return null;
        }

        // ==================== AI 检测 (COCO-SSD) ====================
        async function detectByAI(videoEl) {
            if (!cocoDetector) return null;
            try {
                const predictions = await cocoDetector.detect(videoEl);
                let bestBall = null;
                let bestScore = minConfidence;

                for (const pred of predictions) {
                    if (pred.class === 'sports ball' && pred.score > bestScore) {
                        bestScore = pred.score;
                        bestBall = pred;
                    }
                }

                if (bestBall) {
                    const [x, y, w, h] = bestBall.bbox;
                    return {
                        x: x + w / 2,
                        y: y + h / 2,
                        width: w,
                        height: h,
                        confidence: bestBall.score
                    };
                }
                return null;
            } catch (err) {
                console.warn('AI检测错误:', err);
                return null;
            }
        }

        // ==================== AI + 颜色过滤 ====================
        async function detectByAIColor(videoEl) {
            const aiResult = await detectByAI(videoEl);
            if (!aiResult) return null;

            // 在 AI 检测框内验证颜色
            const offCanvas = document.createElement('canvas');
            offCanvas.width = videoEl.videoWidth;
            offCanvas.height = videoEl.videoHeight;
            const offCtx = offCanvas.getContext('2d');
            offCtx.drawImage(videoEl, 0, 0);

            const margin = 10;
            const sx = Math.max(0, Math.floor(aiResult.x - aiResult.width / 2 - margin));
            const sy = Math.max(0, Math.floor(aiResult.y - aiResult.height / 2 - margin));
            const sw = Math.min(videoEl.videoWidth - sx, Math.ceil(aiResult.width + margin * 2));
            const sh = Math.min(videoEl.videoHeight - sy, Math.ceil(aiResult.height + margin * 2));

            const imageData = offCtx.getImageData(sx, sy, sw, sh);
            const pixels = imageData.data;
            const target = hexToRgb(targetColor);

            let matchCount = 0;
            const total = pixels.length / 4;
            for (let i = 0; i < pixels.length; i += 16) {
                const r = pixels[i], g = pixels[i+1], b = pixels[i+2];
                const dist = colorDistance(r, g, b, target.r, target.g, target.b);
                if (dist < colorTolerance) matchCount++;
            }
            const colorRatio = matchCount / (total / 4);

            if (colorRatio > 0.05) {
                return { ...aiResult, colorConfidence: colorRatio };
            }
            return null;
        }

        // ==================== 背景减除追踪 (纯JS/Canvas) ====================
        // 核心策略: 固定摄像头下, 背景减除是最高效精准的方法
        // 空球道拍一张背景, 之后每帧中"不是背景"的像素 = 球
        const DIFF_SCALE = 0.2;
        
        let backgroundGray = null;
        let backgroundRGB = null;
        let backgroundW = 0, backgroundH = 0;
        let bgCaptured = false;
        let laneColorDev = 60;

        function captureBackground(videoEl) {
            const vw = videoEl.videoWidth, vh = videoEl.videoHeight;
            if (vw <= 0 || vh <= 0) return;
            const sw = Math.max(1, Math.floor(vw * DIFF_SCALE));
            const sh = Math.max(1, Math.floor(vh * DIFF_SCALE));
            diffCanvas.width = sw;
            diffCanvas.height = sh;
            diffCtx.drawImage(videoEl, 0, 0, vw, vh, 0, 0, sw, sh);
            const imgData = diffCtx.getImageData(0, 0, sw, sh);
            const px = imgData.data;
            backgroundW = sw; backgroundH = sh;
            backgroundGray = new Uint8Array(sw * sh);
            backgroundRGB = new Uint8Array(sw * sh * 3);
            for (let i = 0; i < sw * sh; i++) {
                const r = px[i*4], g = px[i*4+1], b = px[i*4+2];
                backgroundGray[i] = (r + g + b) / 3 | 0;
                backgroundRGB[i*3] = r; backgroundRGB[i*3+1] = g; backgroundRGB[i*3+2] = b;
            }
        }

        function getCurrFrame(videoEl) {
            const vw = videoEl.videoWidth, vh = videoEl.videoHeight;
            if (vw <= 0 || vh <= 0) return null;
            if (!diffCanvas) {
                diffCanvas = document.createElement('canvas');
                diffCtx = diffCanvas.getContext('2d');
            }
            const sw = Math.max(1, Math.floor(vw * DIFF_SCALE));
            const sh = Math.max(1, Math.floor(vh * DIFF_SCALE));
            diffCanvas.width = sw;
            diffCanvas.height = sh;
            diffCtx.drawImage(videoEl, 0, 0, vw, vh, 0, 0, sw, sh);
            const imgData = diffCtx.getImageData(0, 0, sw, sh);
            const px = imgData.data;
            const gray = new Uint8Array(sw * sh);
            const rgb = new Uint8Array(sw * sh * 3);
            for (let i = 0; i < sw * sh; i++) {
                const r = px[i*4], g = px[i*4+1], b = px[i*4+2];
                gray[i] = (r + g + b) / 3 | 0;
                rgb[i*3] = r; rgb[i*3+1] = g; rgb[i*3+2] = b;
            }
            return { gray, rgb, w: sw, h: sh, scale: DIFF_SCALE };
        }

        // ========== 构建球道ROI掩码 (只在标定后使用) ==========
        let cachedLaneMask = null;  // 缓存避免每帧重建

        function getLaneMask(w, h, roiTop) {
            if (!laneCorners || laneCorners.length !== 4) return null;
            // 如果尺寸变了就重建
            if (cachedLaneMask && cachedLaneMask.w === w && cachedLaneMask.h === h) return cachedLaneMask.mask;

            const mask = new Uint8Array(w * h);
            const poly = laneCorners.map(c => ({ x: c.x * w, y: c.y * h }));
            const px = poly.map(p => p.x), py = poly.map(p => p.y);
            const minX = Math.max(0, Math.floor(Math.min(...px)));
            const maxX = Math.min(w - 1, Math.ceil(Math.max(...px)));
            const minY = Math.max(roiTop, Math.floor(Math.min(...py)));
            const maxY = Math.min(h - 1, Math.ceil(Math.max(...py)));
            for (let y = minY; y <= maxY; y++) {
                for (let x = minX; x <= maxX; x++) {
                    let inside = false;
                    for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
                        if ((py[i] > y) !== (py[j] > y) &&
                            x < (px[j] - px[i]) * (y - py[i]) / (py[j] - py[i]) + px[i]) {
                            inside = !inside;
                        }
                    }
                    if (inside) mask[y * w + x] = 1;
                }
            }
            cachedLaneMask = { mask, w, h };
            return mask;
        }

        // ========== 主检测: 背景减除 → 找最大差异区域 ==========
        function detectBall(videoEl) {
            const curr = getCurrFrame(videoEl);
            if (!curr) return null;
            const { gray, rgb, w, h, scale } = curr;
            const roiTop = Math.floor(h * 0.02);

            if (!backgroundGray) {
                // 无背景: 降级为帧间差分 (简单但不够准)
                if (!prevFrameGray || prevFrameGray.length !== gray.length) {
                    prevFrameGray = gray;
                    return null;
                }
                const laneMask = getLaneMask(w, h, roiTop);
                const [bx, by, ba] = findLargestDiff(prevFrameGray, gray, laneMask, w, h, roiTop);
                prevFrameGray = gray;
                if (ba < 4) return null;
                return {
                    x: bx / scale, y: by / scale,
                    confidence: clamp(ba / 80, 0.25, 0.85),
                    width: Math.sqrt(ba) / scale,
                    height: Math.sqrt(ba) / scale,
                };
            }

            // 有背景: 背景减除 — 只找"不在背景里"的东西
            const laneMask = getLaneMask(w, h, roiTop);
            const [bx, by, ba] = findLargestDiff(backgroundGray, gray, laneMask, w, h, roiTop);
            if (ba < 3) return null;

            prevBallPos = { x: bx, y: by };
            return {
                x: bx / scale,
                y: by / scale,
                confidence: clamp(ba / 60, 0.3, 0.99),
                width: Math.sqrt(ba) / scale,
                height: Math.sqrt(ba) / scale,
            };
        }

        // ========== 找最大差异连通域 (背景减除核心) ==========
        function findLargestDiff(refGray, currGray, laneMask, w, h, roiTop) {
            const th = 20;  // 灰度差阈值
            const mask = new Uint8Array(w * h);
            let totalActive = 0;

            for (let y = roiTop; y < h; y++) {
                const yOff = y * w;
                for (let x = 0; x < w; x++) {
                    const i = yOff + x;
                    if (laneMask && !laneMask[i]) continue;
                    const d = Math.abs(currGray[i] - refGray[i]);
                    if (d > th) { mask[i] = 1; totalActive++; }
                }
            }

            if (totalActive < 3) return [0, 0, 0];

            // 连通域: 找面积最大的 (球通常是差异最大的连通块)
            const visited = new Uint8Array(w * h);
            let bestCx = 0, bestCy = 0, bestArea = 0;

            for (let y = roiTop; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const idx = y * w + x;
                    if (!mask[idx] || visited[idx]) continue;
                    if (laneMask && !laneMask[idx]) continue;

                    const stack = [[x, y]];
                    visited[idx] = 1;
                    let sx = 0, sy = 0, area = 0;
                    let maxIter = 1500;

                    while (stack.length > 0 && maxIter-- > 0) {
                        const [cx, cy] = stack.pop();
                        sx += cx; sy += cy; area++;

                        for (const [dx, dy] of [[-1,0],[1,0],[0,-1],[0,1]]) {
                            const nx = cx + dx, ny = cy + dy;
                            if (nx >= 0 && nx < w && ny >= roiTop && ny < h) {
                                const ni = ny * w + nx;
                                if (mask[ni] && !visited[ni]) {
                                    visited[ni] = 1;
                                    stack.push([nx, ny]);
                                }
                            }
                        }
                    }

                    if (area > bestArea && area >= 3 && area <= 2000) {
                        bestArea = area;
                        bestCx = sx / area;
                        bestCy = sy / area;
                    }
                }
            }

            return [bestCx, bestCy, bestArea];
        }

        let diffFrameSkip = 0;

        // ==================== 主检测循环 ====================
        async function detectFrame(videoEl) {
            if (!isTracking || isPlaybackMode) return;

            let result = null;

            if (currentMode === 'diff') {
                result = detectBall(videoEl);
            } else {
                switch (currentMode) {
                    case 'ai':
                        result = await detectByAI(videoEl);
                        break;
                    case 'ai_color':
                        result = await detectByAIColor(videoEl);
                        break;
                    case 'color':
                        result = detectByColor(videoEl);
                        break;
                }
            }

            if (result) {
                ballMissCount = 0;
                addTrailPoint(result.x, result.y);
                lastDetectionTime = performance.now();
                // 每3帧算一次转速 (降低计算负载)
                if (trailPoints.length % 3 === 0) {
                    computeFrameRPM(result, videoEl);
                }
                drawDetectionOverlay(result);
                const dirTag = ballDirection === 0 ? '' : ballDirection < 0 ? ' ↑向球瓶' : ' ↓向球瓶';
                setStatus(`检测中 (置信度: ${(result.confidence * 100).toFixed(0)}%)${dirTag}`, 'green');
            } else {
                ballMissCount++;
                if (ballMissCount > 30) {
                    setStatus('未检测到球体', 'yellow');
                }
                detectCtx.clearRect(0, 0, detectOverlay.width, detectOverlay.height);
            }
        }

        function drawDetectionOverlay(result) {
            detectCtx.clearRect(0, 0, detectOverlay.width, detectOverlay.height);

            const cx = result.x, cy = result.y;

            // 脉冲光环 (性能最优: 仅画弧线)
            const ringR = (result.width || 20) * 0.7;
            const pulse = 0.5 + 0.5 * Math.sin(performance.now() / 300);
            detectCtx.beginPath();
            detectCtx.arc(cx, cy, ringR, 0, Math.PI * 2);
            detectCtx.strokeStyle = `rgba(255, 136, 50, ${0.5 + pulse * 0.35})`;
            detectCtx.lineWidth = 2.5;
            detectCtx.stroke();

            // 外圈虚线
            detectCtx.beginPath();
            detectCtx.arc(cx, cy, ringR + 8, 0, Math.PI * 2);
            detectCtx.strokeStyle = `rgba(255, 200, 100, ${0.25 + pulse * 0.15})`;
            detectCtx.lineWidth = 1.5;
            detectCtx.setLineDash([4, 6]);
            detectCtx.stroke();
            detectCtx.setLineDash([]);

            // 中心点 (实心白点)
            detectCtx.beginPath();
            detectCtx.arc(cx, cy, 5, 0, Math.PI * 2);
            detectCtx.fillStyle = '#ffffff';
            detectCtx.fill();
            detectCtx.beginPath();
            detectCtx.arc(cx, cy, 3, 0, Math.PI * 2);
            detectCtx.fillStyle = '#f0883e';
            detectCtx.fill();

            // 轨迹尾部: 在视频画面上画出最近几个轨迹点 (透视到视频像素坐标)
            if (trailPoints.length >= 2) {
                const recent = trailPoints.slice(-15);
                detectCtx.lineWidth = 3;
                detectCtx.lineCap = 'round';
                for (let i = 1; i < recent.length; i++) {
                    const p1 = recent[i - 1], p2 = recent[i];
                    const alpha = 0.15 + 0.85 * (i / recent.length);
                    detectCtx.beginPath();
                    detectCtx.moveTo(p1.rawX, p1.rawY);
                    detectCtx.lineTo(p2.rawX, p2.rawY);
                    detectCtx.strokeStyle = `rgba(240, 136, 62, ${alpha * 0.5})`;
                    detectCtx.stroke();
                }
            }

            // 边界框 (半透明)
            if (result.width && result.height) {
                const x = result.x - result.width / 2;
                const y = result.y - result.height / 2;
                detectCtx.strokeStyle = 'rgba(240, 136, 62, 0.35)';
                detectCtx.lineWidth = 1;
                detectCtx.setLineDash([2, 4]);
                detectCtx.strokeRect(x, y, result.width, result.height);
                detectCtx.setLineDash([]);
            }

            // 置信度标签
            detectCtx.fillStyle = 'rgba(255,255,255,0.6)';
            detectCtx.font = '10px sans-serif';
            detectCtx.textAlign = 'center';
            detectCtx.fillText(`${(result.confidence*100).toFixed(0)}%`, cx, cy - ringR - 12);
        }

        // ==================== 摄像头 ====================
        function updateVideoMirror() {
            // 前置摄像头(user): 镜像翻转 (自拍习惯)
            // 后置摄像头(environment): 不翻转 (真实视角)
            if (isVideoFileMode) {
                video.classList.remove('mirrored');
                return;
            }
            if (currentFacingMode === 'user') {
                video.classList.add('mirrored');
            } else {
                video.classList.remove('mirrored');
            }
        }

        async function startCamera(facingMode) {
            const fm = facingMode || currentFacingMode;
            setStatus('启动摄像头...', 'yellow');
            // 先停掉之前的摄像头
            if (camera) {
                camera.getTracks().forEach(t => t.stop());
                camera = null;
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: fm },
                    audio: false
                });
                camera = stream;
                currentFacingMode = fm;
                video.srcObject = stream;
                // 视频文件模式清除
                if (videoFileURL) {
                    URL.revokeObjectURL(videoFileURL);
                    videoFileURL = null;
                }
                isVideoFileMode = false;
                video.src = '';
                await video.play();

                await new Promise(resolve => {
                    if (video.videoWidth > 0) { resolve(); return; }
                    video.addEventListener('loadedmetadata', resolve, { once: true });
                });

                detectOverlay.width = video.videoWidth;
                detectOverlay.height = video.videoHeight;

                updateVideoMirror();
                const facingLabel = fm === 'environment' ? '后置摄像头 (未翻转)' : '前置摄像头 (镜像)';
                document.getElementById('camLabel').textContent = '— ' + facingLabel;
                setStatus(`摄像头就绪 (${fm === 'environment' ? '后置' : '前置'})`, 'green');
                document.getElementById('switchCameraBtn').style.display = 'inline-block';
                startDetectionLoop();
            } catch (err) {
                console.error('摄像头启动失败:', err);
                setStatus('摄像头错误: ' + err.message, 'red');
            }
        }

        function switchCamera() {
            const newFacing = currentFacingMode === 'user' ? 'environment' : 'user';
            startCamera(newFacing);
        }

        let detectionLoopRunning = false;
        let frameDebugCount = 0;

        function startDetectionLoop() {
            if (detectionLoopRunning) return;
            detectionLoopRunning = true;
            frameDebugCount = 0;
            const loop = async () => {
                if (!detectionLoopRunning) return;
                if (video.readyState >= 2) {
                    frameDebugCount++;
                    // 每60帧输出一次调试信息
                    if (frameDebugCount % 60 === 0) {
                        console.log(`[检测] 已处理${frameDebugCount}帧, isTracking=${isTracking}, 轨迹点数=${trailPoints.length}`);
                    }
                    await detectFrame(video);
                }
                requestAnimationFrame(loop);
            };
            requestAnimationFrame(loop);
            console.log('[检测] 循环已启动');
        }

        // ==================== 轨迹回放 ====================
        function startPlayback() {
            if (trailPoints.length < 2) {
                setStatus('没有足够的轨迹数据', 'yellow');
                return;
            }

            isPlaybackMode = true;
            isTracking = false;
            savedTrail = [...trailPoints];
            trailPoints = [];
            playbackIndex = 0;
            setStatus('回放中...', 'yellow');

            const playbackSpeed = 30; // ms per frame

            function playStep() {
                if (!isPlaybackMode || playbackIndex >= savedTrail.length) {
                    stopPlayback();
                    // 恢复完整轨迹
                    trailPoints = [...savedTrail];
                    drawTrail();
                    updateDataPanel();
                    setStatus('回放完成', 'green');
                    return;
                }

                trailPoints = savedTrail.slice(0, playbackIndex + 1);
                lastPosition = trailPoints[trailPoints.length - 1];
                drawTrail();
                updateDataPanel();

                playbackIndex++;
                playbackTimer = setTimeout(playStep, playbackSpeed);
            }

            playStep();
        }

        function stopPlayback() {
            isPlaybackMode = false;
            if (playbackTimer) {
                clearTimeout(playbackTimer);
                playbackTimer = null;
            }
        }

        // ==================== 球道手动标定 ====================
        let calibrating = false;
        let calibrationPoints = [];

        trailCanvas.addEventListener('click', (e) => {
            if (laneSelect.value !== 'manual' || !calibrating) return;

            const rect = trailCanvas.getBoundingClientRect();
            const scaleX = trailCanvas.width / rect.width;
            const scaleY = trailCanvas.height / rect.height;
            const x = (e.clientX - rect.left) * scaleX / trailCanvas.width;
            const y = (e.clientY - rect.top) * scaleY / trailCanvas.height;

            calibrationPoints.push({ x, y });

            if (calibrationPoints.length === 4) {
                laneCorners = [...calibrationPoints];
                calibrating = false;
                calibrationPoints = [];
                updateHomography();
                setStatus('球道标定完成! 透视变换已启用 | 点击"提取轨迹"开始', 'green');
                drawTrail();
            } else {
                const labels = ['球瓶区左上', '球瓶区右上', '犯规线右下', '犯规线左下'];
                setStatus(`已标定 ${calibrationPoints.length}/4: ${labels[calibrationPoints.length - 1]} | 继续点击下一个角点`, 'yellow');
                drawTrail();
            }
        });

        // ==================== 模型加载 ====================
        async function loadModel() {
            setStatus('加载 AI 模型...', 'yellow');
            try {
                cocoDetector = await cocoSsd.load();
                setStatus('模型就绪，按 Space 开始', 'green');
            } catch (err) {
                console.error('模型加载失败:', err);
                setStatus('模型加载失败', 'red');
            }
        }

        // ==================== 事件监听 ====================
        modeSelect.addEventListener('change', (e) => {
            currentMode = e.target.value;
            setStatus(`模式切换: ${currentMode}`, 'green');
        });

        laneSelect.addEventListener('change', (e) => {
            if (e.target.value === 'manual') {
                calibrating = true;
                calibrationPoints = [];
                laneCorners = null;
                homographyMatrix = null;
                setStatus('请点击轨迹画布上的4个角点 (左上→右上→右下→左下)', 'yellow');
                drawTrail();
            } else {
                calibrating = false;
                laneCorners = null;
                homographyMatrix = null;
                drawTrail();
            }
        });

        // ==================== 视频文件加载 ====================
        function loadVideoFile(file) {
            // 清理旧资源
            if (videoFileURL) {
                URL.revokeObjectURL(videoFileURL);
                videoFileURL = null;
            }
            if (camera) {
                // 停止摄像头流
                camera.getTracks().forEach(t => t.stop());
                camera = null;
            }

            videoFileURL = URL.createObjectURL(file);
            video.srcObject = null;
            video.src = videoFileURL;
            video.loop = false;
            video.muted = false;
            isVideoFileMode = true;

            resetTrail();
            setStatus('视频已加载: ' + file.name, 'green');

            video.onloadedmetadata = () => {
                detectOverlay.width = video.videoWidth;
                detectOverlay.height = video.videoHeight;
            };

            video.onended = () => {
                finishTracking();
            };

            // 启动检测循环 (每帧检测，帧差分模式会自动节流)
            startDetectionLoop();
        }

        document.getElementById('loadVideoBtn').addEventListener('click', () => {
            document.getElementById('videoFileInput').click();
        });

        // 捕获背景帧
        document.getElementById('captureBgBtn').addEventListener('click', () => {
            if (video.readyState < 2) {
                setStatus('请先加载视频或启动摄像头', 'red');
                return;
            }
            captureBackground(video);
            bgCaptured = true;
            setStatus('背景已捕获! 检测精度将大幅提升 | 空球道+无人的最佳', 'green');
        });

        // 跳过标定
        document.getElementById('skipCalibBtn').addEventListener('click', () => {
            calibrating = false;
            calibrationPoints = [];
            laneCorners = null;
            homographyMatrix = null;
            document.getElementById('laneSelect').value = 'none';
            setStatus('已跳过标定 (轨迹将使用原始像素坐标, 可能有透视失真)', 'yellow');
            drawTrail();
        });

        // ===== 面板显示/隐藏 =====
        let videoPanelHidden = false;
        let trailPanelHidden = false;
        let trailMaximized = false;

        function updatePanelVisibility() {
            const videoPanel = document.getElementById('videoPanel');
            const trailPanel = document.getElementById('trailPanel');
            const toggleVideoBtn = document.getElementById('toggleVideoBtn');
            const toggleTrailBtn = document.getElementById('toggleTrailBtn');
            const maxBtn = document.getElementById('maximizeTrailBtn');

            if (videoPanelHidden) {
                videoPanel.classList.add('hidden');
                toggleVideoBtn.innerHTML = '📷 显示';
            } else {
                videoPanel.classList.remove('hidden');
                toggleVideoBtn.innerHTML = '📷 隐藏';
            }

            if (trailMaximized) {
                trailPanel.classList.remove('hidden');
                trailPanel.classList.add('maximized');
                trailPanelHidden = false;
                toggleTrailBtn.innerHTML = '📊 显示';
                maxBtn.innerHTML = '◱ 还原';
                // 最大化时自动隐藏摄像头
                if (!videoPanelHidden) {
                    videoPanel.classList.add('hidden');
                    toggleVideoBtn.innerHTML = '📷 显示';
                }
            } else if (trailPanelHidden) {
                trailPanel.classList.remove('maximized');
                trailPanel.classList.add('hidden');
                toggleTrailBtn.innerHTML = '📊 显示';
                maxBtn.innerHTML = '⬜ 最大化';
            } else {
                trailPanel.classList.remove('hidden', 'maximized');
                toggleTrailBtn.innerHTML = '📊 隐藏';
