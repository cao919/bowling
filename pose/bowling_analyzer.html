                maxBtn.innerHTML = '⬜ 最大化';
            }

            drawTrail();
        }

        document.getElementById('toggleVideoBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            videoPanelHidden = !videoPanelHidden;
            updatePanelVisibility();
        });

        document.getElementById('toggleTrailBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            if (trailMaximized) {
                trailMaximized = false;
                videoPanelHidden = false;
            }
            trailPanelHidden = !trailPanelHidden;
            updatePanelVisibility();
        });

        document.getElementById('maximizeTrailBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            trailMaximized = !trailMaximized;
            if (trailMaximized) {
                trailPanelHidden = false;
                videoPanelHidden = true;
            } else {
                videoPanelHidden = false;
            }
            updatePanelVisibility();
        });

        document.getElementById('cameraBtn').addEventListener('click', () => {
            startCamera();
        });

        document.getElementById('switchCameraBtn').addEventListener('click', () => {
            switchCamera();
        });

        // ===== 轨迹旋转 =====
        function setTrailRotation(degrees) {
            trailRotation = ((degrees % 360) + 360) % 360;
            document.getElementById('rotateAngle').textContent =
                trailRotation !== 0 ? `${trailRotation.toFixed(0)}°` : '';
            drawTrail();
        }

        // 点击按钮旋转90°
        document.getElementById('rotateTrailBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            setTrailRotation(trailRotation + 90);
        });

        // 滚轮旋转
        trailCanvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            setTrailRotation(trailRotation + e.deltaY * 0.3);
        });

        // 双击重置旋转
        trailCanvas.addEventListener('dblclick', () => {
            setTrailRotation(0);
        });

        document.getElementById('videoFileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                loadVideoFile(file);
            }
        });

        // 准备: 启动检测循环, 但不记录轨迹
        document.getElementById('readyBtn').addEventListener('click', () => {
            if (isVideoFileMode) {
                video.currentTime = 0;
                video.play().catch(err => {
                    console.error('视频播放失败:', err);
                    setStatus('视频播放失败: ' + err.message, 'red');
                });
            }
            readyTracking();
        });

        // 开始: 开始记录轨迹 (视频在"准备"时已播放, 不重新播放)
        document.getElementById('startBtn').addEventListener('click', () => {
            if (isVideoFileMode) {
                video.play().catch(err => {
                    console.error('视频播放失败:', err);
                    setStatus('视频播放失败: ' + err.message, 'red');
                });
            }
            startTracking();
        });

        // 暂停: 暂停记录(视频也暂停)
        document.getElementById('pauseBtn').addEventListener('click', () => {
            if (trackState !== 'tracking') return;
            pauseTracking();
            if (isVideoFileMode) video.pause();
        });

        // 结束: 停止记录, 回到idle
        document.getElementById('stopBtn').addEventListener('click', () => {
            finishTracking();
        });

        document.getElementById('playbackBtn').addEventListener('click', () => {
            if (isPlaybackMode) {
                stopPlayback();
                trailPoints = [...savedTrail];
                drawTrail();
                setStatus('回放已停止', 'green');
            } else {
                startPlayback();
            }
        });

        document.getElementById('resetBtn').addEventListener('click', resetTrail);

        // 参数滑块
        laneColorDevInput.addEventListener('input', (e) => {
            laneColorDev = parseInt(e.target.value);
            document.getElementById('laneDevVal').textContent = laneColorDev;
        });

        smoothFactorInput.addEventListener('input', (e) => {
            smoothFactor = parseFloat(e.target.value);
            document.getElementById('smoothVal').textContent = smoothFactor;
        });

        minConfidenceInput.addEventListener('input', (e) => {
            minConfidence = parseFloat(e.target.value);
            document.getElementById('confVal').textContent = minConfidence;
        });

        maxPointsInput.addEventListener('input', (e) => {
            maxPoints = parseInt(e.target.value);
            document.getElementById('pointsVal').textContent = maxPoints;
            while (trailPoints.length > maxPoints) {
                trailPoints.shift();
            }
            drawTrail();
        });

        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;

            switch (e.key.toLowerCase()) {
                case 'r':
                    resetTrail();
                    break;
                case ' ':
                    e.preventDefault();
                    switch (trackState) {
                        case 'idle':
                            // 未准备: 按空格 = 准备
                            if (isVideoFileMode) { video.currentTime = 0; video.play().catch(err => console.error(err)); }
                            readyTracking();
                            break;
                        case 'ready':
                            // 准备就绪: 按空格 = 开始
                            startTracking();
                            break;
                        case 'tracking':
                            // 追踪中: 按空格 = 暂停
                            pauseTracking();
                            if (isVideoFileMode) video.pause();
                            break;
                        case 'paused':
                            // 暂停中: 按空格 = 继续
                            if (isVideoFileMode) video.play().catch(err => console.error(err));
                            startTracking();
                            break;
                    }
                    break;
                case 'p':
                    if (isPlaybackMode) {
                        stopPlayback();
                        trailPoints = [...savedTrail];
                        drawTrail();
                        setStatus('回放已停止', 'green');
                    } else {
                        startPlayback();
                    }
                    break;
            }
        });

        // 窗口大小变化时重绘
        window.addEventListener('resize', () => {
            drawTrail();
        });

        // ==================== 启动 ====================
        window.onload = async () => {
            // 默认启用球道标定模式
            calibrating = true;
            calibrationPoints = [];
            laneCorners = null;
            homographyMatrix = null;
            drawTrail();
            setStatus('1.标定球道4角点 | 2.加载视频 | 3.空球道时点"捕获背景" | 4.准备→开始', 'yellow');
        };
    </script>
</body>
</html>
